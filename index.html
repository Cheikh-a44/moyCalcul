<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Résultats PPV - Consultation des notes</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  :root {
    --primary: #2c5f2d;
    --primary-dark: #1e4420;
    --primary-light: #e8f5e9;
    --secondary: #4a7c59;
    --light: #f5f7fa;
    --white: #ffffff;
    --text: #333333;
    --text-light: #666666;
    --shadow: 0 4px 12px rgba(0,0,0,0.1);
    --radius: 10px;
    --transition: all 0.3s ease;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height: 100%; }
  body { 
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    background:var(--light); 
    color:var(--text); 
    line-height:1.2;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }
  
  header { 
    background:linear-gradient(135deg,var(--primary),var(--secondary)); 
    color:var(--white); 
    padding:1.5rem 1rem; 
    text-align:center; 
  }
  header h1 { font-size:2rem; margin-bottom:0.3rem; }
  header p { font-size:1rem; opacity:0.9; }
  
  .main-content { flex: 1 0 auto; }
  .container { max-width:1000px; margin:0 auto; padding:0 1rem; }
  
  .annonce-container {
    margin-bottom: 0.8rem; padding: 0; border-radius: var(--radius); overflow: hidden;
  }
  .annonce-bloc {
    background: linear-gradient(135deg, #fff3cd, #ffeaa7); border-left: 6px solid #ffc107;
    padding: 0.8rem 1rem; display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 0.8rem; box-shadow: var(--shadow);
  }
  .annonce-texte { flex: 1; font-size: 0.9rem; color: #856404; }
  .annonce-icone { font-size: 1.3rem; margin-right: 0.5rem; vertical-align: middle; }
  .annonce-date { font-size: 0.7rem; color: #856404; margin-top: 0.2rem; }
  
  .section-title { padding:1rem 0 0.8rem; font-size:1.3rem; color:var(--primary); text-align:center; }
  
  .search-box { display:flex; max-width:500px; margin:0 auto; }
  .search-box input { 
    flex:1; padding:0.8rem 1rem; border:2px solid var(--primary-light); 
    border-radius:var(--radius) 0 0 var(--radius); font-size:0.9rem; outline:none; 
  }
  .search-box input:focus { border-color:var(--primary); }
  .search-box button { 
    background:var(--primary); color:var(--white); border:none; padding:0 1.2rem;
    border-radius:0 var(--radius) var(--radius) 0; cursor:pointer; font-size:1rem; min-width:50px;
  }
  .search-box button:hover { background:var(--primary-dark); }
  
  .result-card {
    background:var(--white); border-radius:var(--radius); padding:1.2rem;
    margin:1.5rem 0; box-shadow:var(--shadow);
  }
  
  .student-header {
    text-align:center; margin-bottom:1rem; padding-bottom:0.8rem;
    border-bottom:2px solid var(--primary-light);
  }
  .student-header h3 { font-size:1.2rem; color:var(--text); }
  .student-header p { color:var(--text-light); font-size:0.85rem; }
  
  .empty-state { text-align:center; padding:2rem 1rem; color:var(--text-light); }
  .loading { text-align:center; padding:2rem; color:var(--text-light); }
  .loading i { font-size:2rem; animation:spin 1s linear infinite; margin-bottom:0.8rem; }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  
  .error-state { text-align:center; padding:2rem 1rem; color:#dc3545; }
  .error-state i { font-size:2rem; margin-bottom:0.8rem; }
  .error-state button { 
    margin-top:1rem; padding:0.5rem 1rem; background:var(--primary); 
    color:white; border:none; border-radius:var(--radius); cursor:pointer;
  }
  
  .pdf-link {
    display: inline-block; padding: 0.6rem 1.2rem; background: #28a745; color: white;
    text-decoration: none; border-radius: var(--radius); font-weight: bold; margin-top: 0.8rem;
  }
  .pdf-link:hover { background: #218838; }
  
  .neutral-message {
    text-align: center; margin-top: 0.8rem; padding: 0.6rem; background: #e9ecef;
    color: #6c757d; border-radius: var(--radius);
  }
  
  .simple-table { width: 100%; border-collapse: collapse; margin: 0.8rem 0; font-size: 13px; }
  .simple-table th, .simple-table td { border: 1px solid #ddd; padding: 5px; text-align: center; }
  .simple-table th { background: var(--primary-light); font-weight: bold; }
  .simple-table td:first-child { text-align: left; }
  
  .releve-table { width: 100%; border-collapse: collapse; margin: 0.5rem 0; font-size: 12px; }
  .releve-table th {
    border: 1px solid #aaa; padding: 3px 4px; text-align: center;
    background: var(--primary-light); font-weight: bold;
  }
  .releve-table td { padding: 2px 4px; text-align: center; }
  .releve-table tbody tr:not(.module-row):not(.student-info-row):not(.moyenne-row) td { border: 1px solid #aaa; }
  
  .releve-table .student-info-row { background: #f0f8ff; font-weight: bold; }
  .releve-table .student-info-row td {
    border-top: 1px solid #aaa; border-bottom: 1px solid #aaa;
    border-left: none; border-right: none; padding: 2px 4px;
  }
  .releve-table .student-info-row td:first-child { border-left: 1px solid #aaa; }
  .releve-table .student-info-row td:last-child { border-right: 1px solid #aaa; }
  
  .releve-table .module-row { background: #d4edda; font-weight: bold; }
  .releve-table .module-row td {
    border-top: 1px solid #aaa; border-bottom: 1px solid #aaa;
    border-left: none; border-right: none; padding: 2px 4px;
  }
  .releve-table .module-row td:first-child { border-left: 1px solid #aaa; }
  .releve-table .module-row td:last-child { border-right: 1px solid #aaa; }
  
  .releve-table .subject-row td:first-child { text-align: left; padding-left: 20px; }
  .releve-table .subject-row td { padding: 1px 4px; }
  
  .status-C, .status-V { color: #27ae60; font-weight: bold; }
  .status-NC, .status-NV { color: #e74c3c; font-weight: bold; }
  
  .moyenne-row td { border: none !important; padding: 6px 4px 2px 4px; background: transparent; }
  
  .section-subtitle {
    font-size: 1rem; color: var(--primary); margin: 0.8rem 0 0.3rem 0;
    padding-bottom: 0.2rem; border-bottom: 2px solid var(--primary-light);
  }
  
  .footer {
    flex-shrink: 0; text-align:center; padding:1.5rem; color:var(--text-light);
    font-size:0.85rem; background:var(--light); border-top:1px solid #ddd; margin-top:2rem;
  }
  .footer a { color: var(--primary); text-decoration: none; margin: 0 0.5rem; }
  .footer a:hover { text-decoration: underline; }
  
  @media (max-width:600px) {
    header h1 { font-size:1.6rem; }
    .releve-table { font-size: 10px; }
    .simple-table { font-size: 11px; }
    .search-box button { padding:0 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="container">
    <h1>Résultats PPV</h1>
    <p>Département de Production et Protection Végétales</p>
  </div>
</header>

<div class="main-content">
  <div class="container">
    <div id="annonceContainer" class="annonce-container"></div>
    
    <div class="result-card">
      <h2 class="section-title"> Consulter votre résultat</h2>
      
      <div class="search-box">
        <input type="text" id="studentIdInput" placeholder="Entrez votre numéro d'étudiant...">
        <button onclick="searchStudentResult()" title="Rechercher"><i class="fas fa-search"></i></button>
      </div>
      
      <div id="studentResultContainer" style="display:none;"></div>
      <div id="noResultMessage" style="display:none;" class="empty-state">
        <h3>Aucun résultat trouvé</h3>
        <p>Vérifiez votre numéro d'étudiant</p>
      </div>
    </div>
  </div>
</div>

<footer class="footer">
  <p>© 2026 Département de Production et Protection Végétales</p>
  <p style="margin-top:0.3rem; font-size:0.75rem;">
    <a href="Reco.html"><i class="fas fa-lock"></i> Accès Coordinateur</a>
  </p>
</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDnrW6WnmbEFpbWzlW9IGglxAafajt2Kyo",
    authDomain: "iset-b9974.firebaseapp.com",
    projectId: "iset-b9974",
    storageBucket: "iset-b9974.firebasestorage.app",
    messagingSenderId: "1054170284751",
    appId: "1:1054170284751:web:8f02232478430d5ae2adba",
    databaseURL: "https://iset-b9974-default-rtdb.firebaseio.com/"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const SUBJECTS_BY_DEPT = {
    PPV: {
      S3: ["Français_s3", "Economie", "I_Agronomie", "I_Horticulture", "Pesticides_agricoles", "Entomologie_et_Nemato", "Science_des_sols", "Science_des_plantes"],
      S4: ["Vulgarisation", "Technique_de_propagation", "Technique_d_irrigation_et_BEC", "Ecophysiologie_et_Biochimie", "Fertilite_du_sol", "Methodes_de_diagnostic", "Malherbologie"],
      S5: [], S6: []
    }
  };

  const SUBJECTS_WITHOUT_TP = [
    "Anglais", "Anglais_2", "Français", "Français_2", "Français_s3",
    "Math_et_Statistique", "Economie", "Vulgarisation"
  ];

  const MODULES_STRUCTURE = {
    PPV: {
      S3: { M31: { name: "Module 31", credit: 6.0, subjects: ["Français_s3", "Economie"] }, M32: { name: "Module 32", credit: 8.0, subjects: ["I_Agronomie", "I_Horticulture"] }, M33: { name: "Module 33", credit: 8.0, subjects: ["Pesticides_agricoles", "Entomologie_et_Nemato"] }, M34: { name: "Module 34", credit: 8.0, subjects: ["Science_des_sols", "Science_des_plantes"] } },
      S4: { M41: { name: "Module 41", credit: 3.0, subjects: ["Vulgarisation"] }, M42: { name: "Module 42", credit: 7.0, subjects: ["Technique_de_propagation", "Technique_d_irrigation_et_BEC"] }, M43: { name: "Module 43", credit: 7.0, subjects: ["Ecophysiologie_et_Biochimie", "Fertilite_du_sol"] }, M44: { name: "Module 44", credit: 6.0, subjects: ["Methodes_de_diagnostic", "Malherbologie"] } }
    }
  };

  const SUBJECT_CREDITS = {
    PPV: { S3: { "Français_s3": 3.0, "Economie": 3.0, "I_Agronomie": 4.0, "I_Horticulture": 4.0, "Pesticides_agricoles": 4.0, "Entomologie_et_Nemato": 4.0, "Science_des_sols": 4.0, "Science_des_plantes": 4.0 }, S4: { "Vulgarisation": 3.0, "Technique_de_propagation": 4.0, "Technique_d_irrigation_et_BEC": 3.0, "Ecophysiologie_et_Biochimie": 4.0, "Fertilite_du_sol": 3.0, "Methodes_de_diagnostic": 3.0, "Malherbologie": 3.0 } }
  };

  function hasTP(s) { return !SUBJECTS_WITHOUT_TP.includes(s); }
  function displaySubjectName(s) { return s.replace(/_/g, ' ').replace(/I_/g, 'I.').replace(/et_/g, 'et '); }

  async function loadAnnonce() {
    try {
      const snap = await get(child(ref(db), 'annonces/active'));
      if (snap.exists()) {
        const a = snap.val();
        if (a.expiration && Date.now() < a.expiration) return a;
      }
      return null;
    } catch (e) { return null; }
  }

  async function afficherAnnonce() {
    const a = await loadAnnonce();
    const c = document.getElementById('annonceContainer');
    if (!a || !a.texte) { c.innerHTML = ''; return; }
    const d = new Date(a.expiration).toLocaleString('fr-FR');
    c.innerHTML = `<div class="annonce-bloc"><div style="flex:1"><span class="annonce-icone"><i class="fas fa-bullhorn"></i></span><span class="annonce-texte"><strong>Annonce :</strong> ${a.texte.replace(/</g,'&lt;')}</span><div class="annonce-date">Visible jusqu'au ${d}</div></div></div>`;
  }

  function calculateResults(notes, dept, sem) {
    const mods = MODULES_STRUCTURE[dept]?.[sem];
    if (!mods) return null;
    const req = [];
    for (let m in mods) for (let s of mods[m].subjects) if (!req.includes(s)) req.push(s);
    
    const subjAvg = {}, subjStatus = {}, subjSR = {};
    for (let s of req) {
      const n = notes[s] || {};
      const exam = n['Examen'] ?? 0;
      const cc = n['Contrôle continu'] ?? 0;
      const tp = n['TP'] ?? 0;
      const ratt = n['Rattrapage'];
      const useSR = ratt !== undefined && ratt > exam;
      subjSR[s] = useSR;
      const final = useSR ? ratt : exam;
      subjAvg[s] = hasTP(s) ? (tp + cc * 2 + final * 3) / 6 : (cc * 2 + final * 3) / 5;
      subjStatus[s] = subjAvg[s] >= 10 ? 'C' : 'NC';
    }
    
    const modAvg = {}, modStatus = {}, modCredits = {};
    for (let m in mods) {
      let w = 0, c = 0, earned = 0;
      for (let s of mods[m].subjects) {
        const cr = SUBJECT_CREDITS[dept][sem][s] || 3;
        w += (subjAvg[s] || 0) * cr; c += cr;
        if (subjStatus[s] === 'C') earned += cr;
      }
      modAvg[m] = c > 0 ? w / c : 0;
      modStatus[m] = mods[m].subjects.every(s => subjStatus[s] === 'C') && modAvg[m] >= 10 ? 'V' : 'NV';
      modCredits[m] = earned;
    }
    
    let tw = 0, tc = 0;
    for (let s of req) { const cr = SUBJECT_CREDITS[dept][sem][s] || 3; tw += (subjAvg[s] || 0) * cr; tc += cr; }
    const genMoy = tc > 0 ? tw / tc : 0;
    const hasNV = Object.values(modStatus).some(s => s === 'NV');
    const semStatus = hasNV ? 'Non Validé' : (genMoy >= 10 ? 'Validé' : 'Non Validé');
    const hasSR = Object.values(subjSR).some(v => v);
    
    return { genMoy, semStatus, modStatus, modCredits, modAvg, subjAvg, subjStatus, hasSR, modules: mods };
  }

  window.searchStudentResult = async () => {
    const id = document.getElementById('studentIdInput').value.trim();
    const cont = document.getElementById('studentResultContainer');
    const noRes = document.getElementById('noResultMessage');
    
    if (!id) { 
      alert('Veuillez entrer votre numéro d\'étudiant'); 
      return; 
    }
    
    cont.innerHTML = '<div class="loading"><i class="fas fa-spinner"></i><p>Chargement...</p></div>';
    cont.style.display = 'block'; 
    noRes.style.display = 'none';
    
    let timeoutId;
    const timeoutPromise = new Promise((_, reject) => {
      timeoutId = setTimeout(() => reject(new Error('TIMEOUT')), 15000);
    });
    
    const sems = ['S3', 'S4', 'S5', 'S6'];
    let data = null, sem = null;
    
    try {
      for (let s of sems) {
        try {
          const snap = await Promise.race([
            get(child(ref(db), `results/PPV/${s}/${id}`)),
            timeoutPromise
          ]);
          clearTimeout(timeoutId);
          if (snap.exists()) { 
            data = snap.val(); 
            sem = s; 
            break; 
          }
        } catch (err) {
          clearTimeout(timeoutId);
          if (err.message === 'TIMEOUT') throw err;
          console.warn(`Erreur pour ${s}:`, err);
          continue;
        }
      }
      
      clearTimeout(timeoutId);
      
      if (!data) { 
        cont.style.display = 'none'; 
        noRes.style.display = 'block'; 
        return; 
      }
      
      let name = '';
      const notes = {};
      for (let k in data) {
        if (data[k].name) name = data[k].name;
        if (!notes[data[k].subject]) notes[data[k].subject] = {};
        notes[data[k].subject][data[k].type] = data[k].grade;
      }
      
      const req = SUBJECTS_BY_DEPT.PPV[sem] || [];
      let complete = req.length > 0;
      for (let s of req) {
        const htp = hasTP(s);
        const examExists = notes[s]?.['Examen'] !== undefined;
        const ccExists = notes[s]?.['Contrôle continu'] !== undefined;
        const tpExists = !htp || notes[s]?.['TP'] !== undefined;
        
        if (!examExists || !ccExists || !tpExists) {
          complete = false;
          break;
        }
      }
      
      let html = `<div class="student-header"><h3>${name || 'Étudiant'}</h3><p>N° ${id} | PPV | ${sem}</p></div>`;
      
      if (complete) {
        const res = calculateResults(notes, 'PPV', sem);
        const showSR = res.hasSR;
        
        html += '<div style="overflow-x:auto;"><table class="releve-table"><thead><tr><th>Numéro</th><th>Nom et Prénom</th><th>TP</th><th>CC</th><th>Examen</th>' + (showSR ? '<th>SR</th>' : '') + '<th>NFe</th><th>Crédit</th><th>Obs</th></tr></thead><tbody>';
        html += `<tr class="student-info-row"><td>${id}</td><td style="text-align:left; padding-left:15px;">${name}</td><td></td><td style="text-align:center;"></td><td style="text-align:center;"></td>${showSR ? '<td style="text-align:center;"></td>' : ''}<td style="text-align:center;"></td><td style="text-align:center;"></td><td style="text-align:center;"></td></tr>`;
        
        for (let m in res.modules) {
          const mod = res.modules[m];
          html += `<tr class="module-row"><td>${m}</td><td style="text-align:left; padding-left:15px;">${mod.name}</td><td style="text-align:center;"></td><td style="text-align:center;"></td><td style="text-align:center;"></td>${showSR ? '<td style="text-align:center;"></td>' : ''}<td style="font-weight:bold; text-align:center;">${res.modAvg[m].toFixed(2)}</td><td style="text-align:center;">${res.modCredits[m].toFixed(1)}</td><td class="${res.modStatus[m]==='V'?'status-V':'status-NV'}" style="text-align:center;">${res.modStatus[m]}</td></tr>`;
          for (let s of mod.subjects) {
            const n = notes[s] || {};
            const tp = hasTP(s) ? (n['TP']?.toFixed(2) || '') : '';
            const cc = n['Contrôle continu']?.toFixed(2) || '';
            const exam = n['Examen']?.toFixed(2) || '';
            const ratt = n['Rattrapage'];
            // التعديل: عرض SR دائماً إذا كان موجوداً
            const sr = (ratt !== undefined) ? ratt.toFixed(2) : '';
            const cr = SUBJECT_CREDITS.PPV[sem][s] || 3;
            
            html += `<tr class="subject-row"><td><td style="text-align:left; padding-left:30px;">${displaySubjectName(s)}</td><td style="text-align:center;">${tp}</td><td style="text-align:center;">${cc}</td><td style="text-align:center;">${exam}</td>${showSR?`<td style="text-align:center;">${sr}</td>`:''}<td style="font-weight:bold; text-align:center;">${res.subjAvg[s].toFixed(2)}</td><td style="text-align:center;">${cr.toFixed(1)}</td><td class="${res.subjStatus[s]==='C'?'status-C':'status-NC'}" style="text-align:center;">${res.subjStatus[s]}</td></tr>`;
          }
        }
        
        const colspan = showSR ? 6 : 5;
        html += `<tr class="moyenne-row"><td colspan="${colspan}" style="text-align:right; font-weight:bold;">Moyenne Semestre :</td><td style="font-weight:bold; text-align:center;">${res.genMoy.toFixed(2)}</td><td style="text-align:center;"></td><td class="${res.semStatus==='Validé'?'status-V':'status-NV'}" style="font-weight:bold; text-align:center;">${res.semStatus}</td></tr>`;
        html += '</tbody> nahil</div>';
        html += `<div style="text-align:center;"><a href="result.html?dept=PPV&sem=${sem}&id=${id}&name=${encodeURIComponent(name)}" class="pdf-link" target="_blank"> Télécharger mon relevé PDF</a></div>`;
      } else {
        let hasTPdata = false, hasCC = false, hasExam = false;
        for (let s of req) {
          if (notes[s]?.['TP'] !== undefined) hasTPdata = true;
          if (notes[s]?.['Contrôle continu'] !== undefined) hasCC = true;
          if (notes[s]?.['Examen'] !== undefined) hasExam = true;
        }
        if (hasTPdata) {
          html += `<h4 class="section-subtitle">Résultats TP</h4><table class="simple-table"><thead><tr><th>Matière</th><th>Note TP</th></tr></thead><tbody>`;
          for (let s of req) if (hasTP(s)) { const n = notes[s]?.['TP']; html += `<tr><td style="text-align:left;">${displaySubjectName(s)}</td><td style="text-align:center;">${n!==undefined?n.toFixed(2):''}</td></tr>`; }
          html += `</tbody>}</table>`;
        }
        if (hasCC) {
          html += `<h4 class="section-subtitle">Résultats Contrôle continu</h4><table class="simple-table"><thead><tr><th>Matière</th><th>Note CC</th></tr></thead><tbody>`;
          for (let s of req) { const n = notes[s]?.['Contrôle continu']; html += `<tr><td style="text-align:left;">${displaySubjectName(s)}</td><td style="text-align:center;">${n!==undefined?n.toFixed(2):''}</td></tr>`; }
          html += `</tbody>}</table>`;
        }
        if (hasExam) {
          html += `<h4 class="section-subtitle">Résultats Examen</h4><table class="simple-table"><thead><tr><th>Matière</th><th>Note Examen</th></tr></thead><tbody>`;
          for (let s of req) { const n = notes[s]?.['Examen']; html += `<tr><td style="text-align:left;">${displaySubjectName(s)}</td><td style="text-align:center;">${n!==undefined?n.toFixed(2):''}</td></tr>`; }
          html += `</tbody>}</table>`;
        }
        html += `<div class="neutral-message"> Les résultats ne sont pas encore finalisés.</div>`;
      }
      cont.innerHTML = html;
      
    } catch (error) {
      clearTimeout(timeoutId);
      console.error('Erreur:', error);
      
      if (error.message === 'TIMEOUT') {
        cont.innerHTML = `<div class="error-state">
          <h3>Délai d'attente dépassé</h3>
          <p>Vérifiez votre connexion internet et réessayez.</p>
          <button onclick="searchStudentResult()">Réessayer</button>
        </div>`;
      } else {
        cont.innerHTML = `<div class="error-state">
          <h3>Erreur de connexion</h3>
          <p>Impossible de contacter le serveur. Veuillez réessayer.</p>
          <button onclick="searchStudentResult()">Réessayer</button>
        </div>`;
      }
      cont.style.display = 'block';
      noRes.style.display = 'none';
    }
  };

  document.getElementById('studentIdInput').addEventListener('keyup', e => { if (e.key === 'Enter') searchStudentResult(); });
  afficherAnnonce();
</script>
