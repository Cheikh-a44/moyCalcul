<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relevé de Notes - ISET</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  :root {
    --primary: #0077b6;
    --primary-dark: #005f87;
    --primary-light: #caf0f8;
    --secondary: #0096c7;
    --light: #f5f7fa;
    --white: #ffffff;
    --text: #333333;
    --text-light: #666666;
    --shadow: 0 4px 12px rgba(0,0,0,0.1);
    --radius: 10px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { 
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    background:var(--light); 
    color:var(--text); 
    line-height:1.6;
  }
  header { 
    background:linear-gradient(135deg,var(--primary),var(--secondary)); 
    color:var(--white); 
    padding:2rem 1rem; 
    text-align:center; 
  }
  .container { max-width:1200px; margin:0 auto; padding:0 1rem; }
  .card {
    background:var(--white);
    border-radius:var(--radius);
    padding:1.5rem;
    margin:1rem 0;
    box-shadow:var(--shadow);
  }
  .admin-btn {
    padding:0.8rem 1.5rem;
    background:#f0f0f0;
    color:#333;
    border:1px solid #ccc;
    border-radius:var(--radius);
    font-size:1rem;
    font-weight:600;
    cursor:pointer;
    margin:0.3rem;
    transition:all 0.3s ease;
  }
  .admin-btn:hover { background:#e0e0e0; transform:translateY(-1px); }
  .admin-btn.success { background:#d4edda; border-color:#28a745; color:#155724; }
  
  .student-header { text-align:center; margin-bottom:1.5rem; padding-bottom:1rem; border-bottom:2px solid var(--primary-light); }
  .student-header i { font-size:3rem; color:var(--primary); margin-bottom:0.5rem; }
  
  .releve-table {
    width: 100%;
    border-collapse: collapse;
    margin: 1rem 0;
    font-size: 13px;
  }
  .releve-table th, .releve-table td {
    border: 1px solid #ddd;
    padding: 8px 6px;
    text-align: center;
  }
  .releve-table th {
    background: var(--primary-light);
    font-weight: bold;
  }
  .releve-table .module-row {
    background: #e8f4fc;
    font-weight: bold;
  }
  .releve-table .subject-row td:first-child {
    text-align: left;
    padding-left: 25px;
  }
  .status-C, .status-V { color: #27ae60; font-weight: bold; }
  .status-NC, .status-NV { color: #e74c3c; font-weight: bold; }
  .student-info-row { background: #f0f8ff; font-weight: bold; }
  
  .empty-state { text-align:center; padding:3rem 1rem; color:var(--text-light); }
  .empty-state i { font-size:4rem; margin-bottom:1rem; color:var(--primary-light); }
  
  .neutral-message {
    text-align: center;
    margin-top: 1rem;
    padding: 0.8rem;
    background: #e9ecef;
    color: #6c757d;
    border-radius: var(--radius);
    font-weight: normal;
  }
  
  .simple-table {
    width: 100%;
    border-collapse: collapse;
    margin: 1rem 0;
    font-size: 14px;
  }
  .simple-table th, .simple-table td {
    border: 1px solid #ddd;
    padding: 8px;
    text-align: center;
  }
  .simple-table th {
    background: var(--primary-light);
    font-weight: bold;
  }
  .simple-table td:first-child {
    text-align: left;
  }
  .section-subtitle {
    font-size: 1.1rem;
    color: var(--primary);
    margin: 1rem 0 0.5rem 0;
    padding-bottom: 0.3rem;
    border-bottom: 2px solid var(--primary-light);
  }
  
  .loading-spinner {
    text-align: center;
    padding: 3rem;
  }
  .loading-spinner i {
    font-size: 3rem;
    color: var(--primary);
    animation: spin 1s linear infinite;
  }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  
  @media (max-width:768px) {
    .releve-table { font-size: 11px; }
    .releve-table th, .releve-table td { padding: 6px 4px; }
  }
</style>
</head>
<body>

<header>
  <div class="container">
    <h1><i class="fas fa-graduation-cap"></i> ISET - Relevé de Notes</h1>
    <p>Document officiel des résultats académiques</p>
  </div>
</header>

<div class="container">
  <div id="studentView" class="card">
    <div id="studentResults">
      <div class="loading-spinner">
        <i class="fas fa-spinner"></i>
        <p>Chargement des résultats...</p>
      </div>
    </div>
    <div id="pdfButtonContainer" style="text-align:center; margin-top:1.5rem;"></div>
  </div>
</div>

<footer class="footer" style="text-align:center; padding:2rem; color:#666;">
  <p>© 2024 ISET - Institut Supérieur d'Enseignement Technologique</p>
  <p style="margin-top:0.5rem; font-size:0.8rem;">Développé par Cheikh_A</p>
</footer>

<script type="module">
  // ==================== IMPORTS FIREBASE ====================
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, child, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ==================== CONFIGURATION FIREBASE ====================
  const firebaseConfig = {
    apiKey: "AIzaSyDnrW6WnmbEFpbWzlW9IGglxAafajt2Kyo",
    authDomain: "iset-b9974.firebaseapp.com",
    projectId: "iset-b9974",
    storageBucket: "iset-b9974.firebasestorage.app",
    messagingSenderId: "1054170284751",
    appId: "1:1054170284751:web:8f02232478430d5ae2adba",
    databaseURL: "https://iset-b9974-default-rtdb.firebaseio.com/"
  };

  // تهيئة Firebase
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // ==================== CONFIGURATION DES DONNÉES (متوافقة تماماً مع index.html) ====================
  // أسماء المواد بنفس صيغة index.html (باستخدام _ وبدون مسافات)
  const SUBJECTS_BY_DEPT = {
    TC: {
      S1: ["Anglais", "Français", "Math_et_Statistique", "Informatique", "Physique", "Chimie", "Biologie", "Micro_et_Genetique"],
      S2: ["Anglais_2", "Français_2", "PPV", "TIC", "PSA", "STA", "GAB", "GEM"]
    },
    PPV: {
      S3: ["Français_s3", "Economie", "I_Agronomie", "I_Horticulture", "Pesticides_agricoles", "Entomologie_et_Nemato", "Science_des_sols", "Science_des_plantes"],
      S4: ["Vulgarisation", "Technique_de_propagation", "Technique_d_irrigation_et_BEC", "Ecophysiologie_et_Biochimie", "Fertilite_du_sol", "Methodes_de_diagnostic", "Malherbologie"],
      S5: [], S6: []
    }
  };

  // المواد التي ليس لها TP
  const SUBJECTS_WITHOUT_TP = [
    "Anglais", "Anglais_2", "Français", "Français_2", "Français_s3",
    "Math_et_Statistique", "Economie", "Vulgarisation", "Technique_d_irrigation_et_BEC"
  ];

  // هيكل الموديولات - متوافق مع index.html
  const MODULES_STRUCTURE = {
    TC: {
      S1: {
        M11: { name: "Module 11", credit: 6.0, subjects: ["Anglais", "Français"] },
        M12: { name: "Module 12", credit: 8.0, subjects: ["Informatique", "Math_et_Statistique"] },
        M13: { name: "Module 13", credit: 8.0, subjects: ["Physique", "Chimie"] },
        M14: { name: "Module 14", credit: 8.0, subjects: ["Biologie", "Micro_et_Genetique"] }
      },
      S2: {
        M21: { name: "Module 21", credit: 6.0, subjects: ["Anglais_2", "Français_2"] },
        M22: { name: "Module 22", credit: 6.0, subjects: ["TIC", "PPV"] },
        M23: { name: "Module 23", credit: 6.0, subjects: ["PSA", "STA"] },
        M24: { name: "Module 24", credit: 6.0, subjects: ["GEM", "GAB"] }
      }
    },
    PPV: {
      S3: {
        M31: { name: "Module 31", credit: 6.0, subjects: ["Français_s3", "Economie"] },
        M32: { name: "Module 32", credit: 8.0, subjects: ["I_Agronomie", "I_Horticulture"] },
        M33: { name: "Module 33", credit: 8.0, subjects: ["Pesticides_agricoles", "Entomologie_et_Nemato"] },
        M34: { name: "Module 34", credit: 8.0, subjects: ["Science_des_sols", "Science_des_plantes"] }
      },
      S4: {
        M41: { name: "Module 41", credit: 3.0, subjects: ["Vulgarisation"] },
        M42: { name: "Module 42", credit: 7.0, subjects: ["Technique_de_propagation", "Technique_d_irrigation_et_BEC"] },
        M43: { name: "Module 43", credit: 7.0, subjects: ["Ecophysiologie_et_Biochimie", "Fertilite_du_sol"] },
        M44: { name: "Module 44", credit: 6.0, subjects: ["Methodes_de_diagnostic", "Malherbologie"] }
      }
    }
  };

  // أرصدة المواد - متوافق مع index.html
  const SUBJECT_CREDITS = {
    TC: {
      S1: { "Anglais": 3.0, "Français": 3.0, "Informatique": 3.0, "Math_et_Statistique": 5.0, "Physique": 4.0, "Chimie": 4.0, "Biologie": 4.0, "Micro_et_Genetique": 4.0 },
      S2: { "Anglais_2": 3.0, "Français_2": 3.0, "TIC": 3.0, "PPV": 3.0, "PSA": 3.0, "STA": 3.0, "GEM": 3.0, "GAB": 3.0 }
    },
    PPV: {
      S3: { "Français_s3": 3.0, "Economie": 3.0, "I_Agronomie": 4.0, "I_Horticulture": 4.0, "Pesticides_agricoles": 4.0, "Entomologie_et_Nemato": 4.0, "Science_des_sols": 4.0, "Science_des_plantes": 4.0 },
      S4: { "Vulgarisation": 3.0, "Technique_de_propagation": 4.0, "Technique_d_irrigation_et_BEC": 3.0, "Ecophysiologie_et_Biochimie": 4.0, "Fertilite_du_sol": 3.0, "Methodes_de_diagnostic": 3.0, "Malherbologie": 3.0 }
    }
  };

  // ==================== دوال مساعدة ====================
  function hasTP(subjectName) {
    return !SUBJECTS_WITHOUT_TP.includes(subjectName);
  }

  // تحويل اسم المادة من صيغة التخزين إلى صيغة العرض
  function displaySubjectName(subject) {
    return subject
      .replace(/_/g, ' ')
      .replace(/I_/g, 'I.')
      .replace(/et_/g, 'et ')
      .replace(/_s3/g, ' s3')
      .replace(/_2/g, ' 2');
  }

  // تنظيف النص لتجنب XSS
  function escapeHtml(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  // متغيرات عامة
  let currentData = null;
  let currentStudentId = null;
  let currentDept = null;
  let currentSemester = null;
  let currentStudentName = '';

  // ==================== دالة حساب النتائج ====================
  function calculateResultsFromNotes(notesBySubject, dept, semester) {
    const modulesStructure = MODULES_STRUCTURE[dept]?.[semester];
    if (!modulesStructure) return null;
    
    const requiredSubjects = [];
    for (let moduleCode in modulesStructure) {
      for (let subject of modulesStructure[moduleCode].subjects) {
        if (!requiredSubjects.includes(subject)) requiredSubjects.push(subject);
      }
    }
    
    const subjectAverages = {};
    const subjectStatus = {};
    
    for (let subject of requiredSubjects) {
      const notes = notesBySubject[subject] || {};
      const hasTPforSubject = hasTP(subject);
      const exam = notes['Examen'] || 0;
      const cc = notes['Contrôle continu'] || 0;
      const tp = notes['TP'] || 0;
      const rattrapage = notes['Rattrapage'];
      const finalExam = (rattrapage !== undefined && rattrapage > exam) ? rattrapage : exam;
      
      let moyenne;
      if (hasTPforSubject) {
        moyenne = (tp * 1 + cc * 2 + finalExam * 3) / 6;
      } else {
        moyenne = (cc * 2 + finalExam * 3) / 5;
      }
      subjectAverages[subject] = moyenne;
      subjectStatus[subject] = moyenne >= 10 ? 'C' : 'NC';
    }
    
    const moduleAverages = {};
    const moduleStatus = {};
    
    for (let moduleCode in modulesStructure) {
      const module = modulesStructure[moduleCode];
      let totalWeighted = 0;
      let totalCredits = 0;
      for (let subject of module.subjects) {
        const credit = SUBJECT_CREDITS[dept]?.[semester]?.[subject] || 3.0;
        totalWeighted += (subjectAverages[subject] || 0) * credit;
        totalCredits += credit;
      }
      const moduleMoyenne = totalCredits > 0 ? totalWeighted / totalCredits : 0;
      moduleAverages[moduleCode] = moduleMoyenne;
      
      let allC = true;
      for (let subject of module.subjects) {
        if (subjectStatus[subject] !== 'C') allC = false;
      }
      moduleStatus[moduleCode] = allC && moduleMoyenne >= 10 ? 'V' : 'NV';
    }
    
    let totalWeightedGeneral = 0;
    let totalCreditsGeneral = 0;
    for (let subject of requiredSubjects) {
      const credit = SUBJECT_CREDITS[dept]?.[semester]?.[subject] || 3.0;
      totalWeightedGeneral += (subjectAverages[subject] || 0) * credit;
      totalCreditsGeneral += credit;
    }
    const generaleMoyenne = totalCreditsGeneral > 0 ? totalWeightedGeneral / totalCreditsGeneral : 0;
    const semestreStatus = generaleMoyenne >= 10 ? 'Validé' : 'Non Validé';
    
    const modules = {};
    for (let moduleCode in modulesStructure) {
      const module = modulesStructure[moduleCode];
      modules[moduleCode] = {
        name: module.name,
        moyenne: moduleAverages[moduleCode],
        status: moduleStatus[moduleCode],
        credit: module.credit,
        subjects: module.subjects.map(s => ({
          name: s,
          credit: SUBJECT_CREDITS[dept]?.[semester]?.[s] || 3.0,
          moyenne: subjectAverages[s],
          status: subjectStatus[s],
          hasTP: hasTP(s)
        }))
      };
    }
    
    return {
      moyenneGenerale: generaleMoyenne,
      semestreStatus: semestreStatus,
      modules: modules,
      calculated: true
    };
  }

  // ==================== عرض النتائج ====================
  async function loadAndDisplay() {
    const urlParams = new URLSearchParams(window.location.search);
    const dept = urlParams.get('dept');
    const sem = urlParams.get('sem');
    const id = urlParams.get('id');
    const name = urlParams.get('name');
    
    // التحقق من وجود المعلمات
    if (!dept || !sem || !id) {
      document.getElementById('studentResults').innerHTML = `
        <div class="empty-state">
          <i class="fas fa-exclamation-triangle"></i>
          <h3>Lien invalide</h3>
          <p>Veuillez utiliser le lien fourni par l'administration.</p>
        </div>
      `;
      return;
    }
    
    currentDept = dept;
    currentSemester = sem;
    currentStudentId = id;
    currentStudentName = name ? decodeURIComponent(name) : '';
    
    try {
      // جلب البيانات من Firebase
      const snapshot = await get(child(ref(db), `results/${dept}/${sem}/${id}`));
      
      if (!snapshot.exists()) {
        document.getElementById('studentResults').innerHTML = `
          <div class="empty-state">
            <i class="fas fa-user-graduate"></i>
            <h3>Aucun résultat trouvé</h3>
            <p>Aucune donnée n'a été trouvée pour cet étudiant.</p>
          </div>
        `;
        return;
      }
      
      const studentData = snapshot.val();
      
      // استخراج اسم الطالب إذا لم يكن موجوداً في URL
      if (!currentStudentName) {
        for (let key in studentData) {
          if (studentData[key].name) {
            currentStudentName = studentData[key].name;
            break;
          }
        }
      }
      
      // تجميع النقاط حسب المادة ونوع التقييم
      const notesBySubject = {};
      for (let key in studentData) {
        const data = studentData[key];
        if (!notesBySubject[data.subject]) notesBySubject[data.subject] = {};
        notesBySubject[data.subject][data.type] = data.grade;
      }
      
      const modulesStructure = MODULES_STRUCTURE[dept]?.[sem];
      let allSubjectsPresent = true;
      
      // التحقق من اكتمال جميع النقاط
      if (modulesStructure) {
        for (let moduleCode in modulesStructure) {
          for (let subject of modulesStructure[moduleCode].subjects) {
            const hasTPforSubject = hasTP(subject);
            const examExists = notesBySubject[subject] && notesBySubject[subject]['Examen'] !== undefined;
            const ccExists = notesBySubject[subject] && notesBySubject[subject]['Contrôle continu'] !== undefined;
            const tpExists = !hasTPforSubject || (notesBySubject[subject] && notesBySubject[subject]['TP'] !== undefined);
            if (!examExists || !ccExists || !tpExists) {
              allSubjectsPresent = false;
              break;
            }
          }
        }
      }
      
      // حفظ البيانات للاستخدام في PDF
      currentData = {
        name: currentStudentName,
        grades: notesBySubject,
        raw: studentData
      };
      
      if (allSubjectsPresent && modulesStructure) {
        // جميع النقاط مكتملة - حساب النتائج وعرض كشف النقاط الكامل
        const results = calculateResultsFromNotes(notesBySubject, dept, sem);
        currentData.results = results;
        
        let html = `
          <div class="student-header">
            <i class="fas fa-user-graduate"></i>
            <h3>${escapeHtml(currentStudentName) || 'Étudiant'}</h3>
            <p>N° ${escapeHtml(id)} | ${escapeHtml(dept)} | ${escapeHtml(sem)}</p>
          </div>
          <div style="overflow-x:auto;">
            <table class="releve-table">
              <thead>
                <tr>
                  <th>Numéro</th>
                  <th>Nom et Prénom</th>
                  <th>TP</th>
                  <th>CC</th>
                  <th>Examen</th>
                  <th>NFe</th>
                  <th>Crédit</th>
                  <th>Observations</th>
                </tr>
              </thead>
              <tbody>
                <tr class="student-info-row">
                  <td>${escapeHtml(id)}</td>
                  <td style="text-align:left; padding-left:15px;">${escapeHtml(currentStudentName)}</td>
                  <td>-</td><td>-</td><td>-</td>
                  <td style="font-weight:bold;">Moy Sem: ${results.moyenneGenerale.toFixed(2)}</td>
                  <td>-</td>
                  <td class="${results.semestreStatus === 'Validé' ? 'status-V' : 'status-NV'}">${results.semestreStatus}</td>
                </tr>
        `;
        
        for (let moduleCode in results.modules) {
          const module = results.modules[moduleCode];
          html += `
            <tr class="module-row">
              <td>${escapeHtml(moduleCode)}</td>
              <td style="text-align:left; padding-left:15px;">${escapeHtml(module.name)}</td>
              <td>-</td><td>-</td><td>-</td>
              <td style="font-weight:bold;">${module.moyenne.toFixed(2)}</td>
              <td>${module.credit}</td>
              <td class="${module.status === 'V' ? 'status-V' : 'status-NV'}">${module.status}</td>
            </tr>
          `;
          
          for (let subject of module.subjects) {
            const grades = notesBySubject[subject.name] || {};
            const tpDisplay = subject.hasTP ? (grades['TP'] !== undefined ? grades['TP'].toFixed(2) : '-') : '-';
            const creditEarned = subject.status === 'C' ? subject.credit : 0;
            
            html += `
              <tr class="subject-row">
                <td>-</td>
                <td style="text-align:left; padding-left:40px;">${escapeHtml(displaySubjectName(subject.name))}</td>
                <td>${tpDisplay}</td>
                <td>${grades['Contrôle continu'] !== undefined ? grades['Contrôle continu'].toFixed(2) : '-'}</td>
                <td>${grades['Examen'] !== undefined ? grades['Examen'].toFixed(2) : '-'}</td>
                <td style="font-weight:bold;">${subject.moyenne.toFixed(2)}</td>
                <td>${creditEarned.toFixed(1)}</td>
                <td class="${subject.status === 'C' ? 'status-C' : 'status-NC'}">${subject.status}</td>
              </tr>
            `;
          }
        }
        
        html += `
              </tbody>
            </table>
          </div>
        `;
        
        document.getElementById('studentResults').innerHTML = html;
        document.getElementById('pdfButtonContainer').innerHTML = `
          <button class="admin-btn success" onclick="window.generatePDF()">
            <i class="fas fa-file-pdf"></i> 📂 Télécharger mon relevé PDF
          </button>
        `;
        
      } else {
        // النقاط غير مكتملة - عرض النتائج الجزئية
        let html = `
          <div class="student-header">
            <i class="fas fa-user-graduate"></i>
            <h3>${escapeHtml(currentStudentName) || 'Étudiant'}</h3>
            <p>N° ${escapeHtml(id)} | ${escapeHtml(dept)} | ${escapeHtml(sem)}</p>
          </div>
          <div class="neutral-message">
            <i class="fas fa-info-circle"></i> Les résultats ne sont pas encore finalisés par le coordinateur.
          </div>
        `;
        
        if (modulesStructure) {
          // عرض نتائج TP
          let hasTPData = false;
          let tpHtml = '<h4 class="section-subtitle"><i class="fas fa-flask"></i> Résultats TP</h4><table class="simple-table"><thead><tr><th>Matière</th><th>Note TP</th></tr></thead><tbody>';
          for (let moduleCode in modulesStructure) {
            for (let subject of modulesStructure[moduleCode].subjects) {
              if (hasTP(subject)) {
                const grade = notesBySubject[subject]?.['TP'];
                if (grade !== undefined) hasTPData = true;
                tpHtml += `<tr><td>${escapeHtml(displaySubjectName(subject))}</td><td>${grade !== undefined ? grade.toFixed(2) : '-'}</td></tr>`;
              }
            }
          }
          tpHtml += '</tbody></table>';
          if (hasTPData) html += tpHtml;
          
          // عرض نتائج CC
          let ccHtml = '<h4 class="section-subtitle"><i class="fas fa-pencil-alt"></i> Résultats Contrôle continu</h4><table class="simple-table"><thead><tr><th>Matière</th><th>Note CC</th></tr></thead><tbody>';
          for (let moduleCode in modulesStructure) {
            for (let subject of modulesStructure[moduleCode].subjects) {
              const grade = notesBySubject[subject]?.['Contrôle continu'];
              ccHtml += `<tr><td>${escapeHtml(displaySubjectName(subject))}</td><td>${grade !== undefined ? grade.toFixed(2) : '-'}</td></tr>`;
            }
          }
          ccHtml += '</tbody></table>';
          html += ccHtml;
          
          // عرض نتائج Examen
          let examHtml = '<h4 class="section-subtitle"><i class="fas fa-file-alt"></i> Résultats Examen</h4><table class="simple-table"><thead><tr><th>Matière</th><th>Note Examen</th></tr></thead><tbody>';
          for (let moduleCode in modulesStructure) {
            for (let subject of modulesStructure[moduleCode].subjects) {
              const grade = notesBySubject[subject]?.['Examen'];
              examHtml += `<tr><td>${escapeHtml(displaySubjectName(subject))}</td><td>${grade !== undefined ? grade.toFixed(2) : '-'}</td></tr>`;
            }
          }
          examHtml += '</tbody></table>';
          html += examHtml;
          
          // عرض نتائج Rattrapage إن وجدت
          let hasRattrapage = false;
          let rattrapageHtml = '<h4 class="section-subtitle"><i class="fas fa-redo-alt"></i> Résultats Rattrapage</h4><table class="simple-table"><thead><tr><th>Matière</th><th>Note Rattrapage</th></tr></thead><tbody>';
          for (let moduleCode in modulesStructure) {
            for (let subject of modulesStructure[moduleCode].subjects) {
              const grade = notesBySubject[subject]?.['Rattrapage'];
              if (grade !== undefined) {
                hasRattrapage = true;
                rattrapageHtml += `<tr><td>${escapeHtml(displaySubjectName(subject))}</td><td>${grade.toFixed(2)}</td></tr>`;
              }
            }
          }
          rattrapageHtml += '</tbody></table>';
          if (hasRattrapage) html += rattrapageHtml;
        }
        
        document.getElementById('studentResults').innerHTML = html;
        document.getElementById('pdfButtonContainer').innerHTML = '';
      }
      
    } catch (error) {
      console.error('Erreur:', error);
      document.getElementById('studentResults').innerHTML = `
        <div class="empty-state">
          <i class="fas fa-exclamation-circle"></i>
          <h3>Erreur de chargement</h3>
          <p>Une erreur est survenue lors du chargement des résultats.</p>
          <p style="font-size:0.8rem; margin-top:1rem;">${escapeHtml(error.message)}</p>
        </div>
      `;
    }
  }
  
  // ==================== دالة توليد PDF ====================
  window.generatePDF = function() {
    if (!currentData || !currentData.results) {
      alert("Les résultats complets ne sont pas encore disponibles pour générer le PDF.");
      return;
    }
    
    const results = currentData.results;
    const studentName = currentData.name;
    const date = new Date();
    const dateStr = date.toLocaleDateString('fr-FR', { year: 'numeric', month: 'long', day: 'numeric' });
    
    // بناء محتوى PDF بتنسيق رسمي
    let content = `
      <div style="padding: 12mm; font-family: 'Times New Roman', Times, serif; font-size: 11pt;">
        <!-- رأس الصفحة -->
        <div style="text-align:center; margin-bottom:20px;">
          <h2 style="margin:5px 0;">République Islamique de Mauritanie</h2>
          <h3 style="margin:5px 0;">Ministère de l'Enseignement Supérieur et de la Recherche Scientifique</h3>
          <h3 style="margin:5px 0;">Institut Supérieur d'Enseignement Technologique de Rosso</h3>
          <hr style="margin:15px 0; border:1px solid #0077b6;">
          <h1 style="color:#0077b6; margin:10px 0;">RELEVÉ DE NOTES</h1>
          <h3 style="margin:5px 0;">Semestre ${escapeHtml(currentSemester)}</h3>
          <h3 style="margin:5px 0;">Année académique 2024-2025</h3>
        </div>
        
        <!-- معلومات الطالب -->
        <table style="width:100%; border-collapse:collapse; margin-bottom:20px; border:1px solid #000;">
          <tr>
            <td style="padding:8px; border:1px solid #000;"><strong>Étudiant(e) :</strong> ${escapeHtml(studentName)}</td>
            <td style="padding:8px; border:1px solid #000;"><strong>N° d'étudiant :</strong> ${escapeHtml(currentStudentId)}</td>
            <td style="padding:8px; border:1px solid #000;"><strong>Département :</strong> ${escapeHtml(currentDept)}</td>
          </tr>
        </table>
        
        <!-- جدول النتائج -->
        <table style="width:100%; border-collapse:collapse; border:1px solid #000; font-size:10pt;">
          <thead>
            <tr style="background:#caf0f8;">
              <th style="border:1px solid #000; padding:6px;">Numéro</th>
              <th style="border:1px solid #000; padding:6px;">Nom et Prénom</th>
              <th style="border:1px solid #000; padding:6px;">TP</th>
              <th style="border:1px solid #000; padding:6px;">CC</th>
              <th style="border:1px solid #000; padding:6px;">Examen</th>
              <th style="border:1px solid #000; padding:6px;">NFe</th>
              <th style="border:1px solid #000; padding:6px;">Crédit</th>
              <th style="border:1px solid #000; padding:6px;">Obs</th>
            </tr>
          </thead>
          <tbody>
            <tr style="background:#f0f8ff;">
              <td style="border:1px solid #000; padding:6px;">${escapeHtml(currentStudentId)}</td>
              <td style="border:1px solid #000; padding:6px; text-align:left;">${escapeHtml(studentName)}</td>
              <td style="border:1px solid #000; padding:6px;">-</td>
              <td style="border:1px solid #000; padding:6px;">-</td>
              <td style="border:1px solid #000; padding:6px;">-</td>
              <td style="border:1px solid #000; padding:6px; font-weight:bold;">Moy: ${results.moyenneGenerale.toFixed(2)}</td>
              <td style="border:1px solid #000; padding:6px;">-</td>
              <td style="border:1px solid #000; padding:6px; font-weight:bold;">${results.semestreStatus}</td>
            </tr>
    `;
    
    // إضافة الموديولات والمواد
    for (let moduleCode in results.modules) {
      const module = results.modules[moduleCode];
      content += `
        <tr style="background:#e8f4fc;">
          <td style="border:1px solid #000; padding:6px;">${escapeHtml(moduleCode)}</td>
          <td style="border:1px solid #000; padding:6px; text-align:left;">${escapeHtml(module.name)}</td>
          <td style="border:1px solid #000; padding:6px;">-</td>
          <td style="border:1px solid #000; padding:6px;">-</td>
          <td style="border:1px solid #000; padding:6px;">-</td>
          <td style="border:1px solid #000; padding:6px; font-weight:bold;">${module.moyenne.toFixed(2)}</td>
          <td style="border:1px solid #000; padding:6px;">${module.credit}</td>
          <td style="border:1px solid #000; padding:6px;">${module.status}</td>
        </tr>
      `;
      
      for (let subject of module.subjects) {
        const grades = currentData.grades[subject.name] || {};
        const tpDisplay = subject.hasTP ? (grades['TP'] !== undefined ? grades['TP'].toFixed(2) : '-') : '-';
        const creditEarned = subject.status === 'C' ? subject.credit : 0;
        
        content += `
          <tr>
            <td style="border:1px solid #000; padding:6px;">-</td>
            <td style="border:1px solid #000; padding:6px; text-align:left; padding-left:20px;">${escapeHtml(displaySubjectName(subject.name))}</td>
            <td style="border:1px solid #000; padding:6px;">${tpDisplay}</td>
            <td style="border:1px solid #000; padding:6px;">${grades['Contrôle continu'] !== undefined ? grades['Contrôle continu'].toFixed(2) : '-'}</td>
            <td style="border:1px solid #000; padding:6px;">${grades['Examen'] !== undefined ? grades['Examen'].toFixed(2) : '-'}</td>
            <td style="border:1px solid #000; padding:6px; font-weight:bold;">${subject.moyenne.toFixed(2)}</td>
            <td style="border:1px solid #000; padding:6px;">${creditEarned.toFixed(1)}</td>
            <td style="border:1px solid #000; padding:6px;">${subject.status}</td>
          </tr>
        `;
      }
    }
    
    content += `
          </tbody>
        </table>
        
        <!-- التوقيع والتاريخ -->
        <div style="margin-top:30px;">
          <p style="text-align:right;">Fait à Rosso, le ${dateStr}</p>
          <div style="text-align:right; margin-top:30px;">
            <p>Le Chef du Service Scolarité</p>
            <div style="border-top:1px solid #000; width:200px; margin-top:5px; margin-left:auto;"></div>
          </div>
        </div>
        
        <!-- تذييل الصفحة -->
        <div style="position:fixed; bottom:10px; left:0; right:0; text-align:center; font-size:8pt; color:#666;">
          ISET Rosso - Document officiel généré le ${dateStr}
        </div>
      </div>
    `;
    
    // إنشاء عنصر مؤقت وتوليد PDF
    const element = document.createElement('div');
    element.innerHTML = content;
    document.body.appendChild(element);
    
    const opt = {
      margin: [10, 10, 10, 10],
      filename: `Releve_${currentStudentId}_${currentSemester}.pdf`,
      image: { type: 'jpeg', quality: 0.98 },
      html2canvas: { scale: 2, letterRendering: true },
      jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };
    
    html2pdf().set(opt).from(element).save().then(() => {
      document.body.removeChild(element);
    }).catch(err => {
      console.error('Erreur PDF:', err);
      alert('Erreur lors de la génération du PDF. Veuillez réessayer.');
      document.body.removeChild(element);
    });
  };
  
  // بدء التحميل عند فتح الصفحة
  loadAndDisplay();
</script>
</body>
</html>
