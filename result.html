<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relevé de Notes - ISET</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  :root {
    --primary: #0077b6;
    --primary-dark: #005f87;
    --primary-light: #caf0f8;
    --secondary: #0096c7;
    --light: #f5f7fa;
    --white: #ffffff;
    --text: #333333;
    --text-light: #666666;
    --shadow: 0 4px 12px rgba(0,0,0,0.1);
    --radius: 10px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { 
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    background:var(--light); 
    color:var(--text); 
    line-height:1.2;
  }
  header { 
    background:linear-gradient(135deg,var(--primary),var(--secondary)); 
    color:var(--white); 
    padding:1.5rem 1rem; 
    text-align:center; 
  }
  .container { max-width:1200px; margin:0 auto; padding:0 1rem; }
  .card {
    background:var(--white);
    border-radius:var(--radius);
    padding:1rem;
    margin:0.5rem 0;
    box-shadow:var(--shadow);
  }
  .admin-btn {
    padding:0.6rem 1.2rem;
    background:#f0f0f0;
    color:#333;
    border:1px solid #ccc;
    border-radius:var(--radius);
    font-size:0.9rem;
    font-weight:600;
    cursor:pointer;
    margin:0.3rem;
    transition:all 0.3s ease;
  }
  .admin-btn:hover { background:#e0e0e0; transform:translateY(-1px); }
  .admin-btn.success { background:#d4edda; border-color:#28a745; color:#155724; }
  
  .student-header { text-align:center; margin-bottom:1rem; padding-bottom:0.8rem; border-bottom:2px solid var(--primary-light); }
  .student-header i { font-size:2.5rem; color:var(--primary); margin-bottom:0.3rem; }
  .student-header h3 { font-size:1.2rem; }
  .student-header p { font-size:0.85rem; }
  
  .releve-table {
    width: 100%;
    border-collapse: collapse;
    margin: 0.5rem 0;
    font-size: 12px;
  }
  .releve-table th {
    border: 1px solid #aaa;
    padding: 3px 4px;
    text-align: center;
    background: var(--primary-light);
    font-weight: bold;
  }
  .releve-table td { padding: 2px 4px; text-align: center; }
  
  .releve-table tbody tr:not(.module-row):not(.student-info-row):not(.moyenne-row) td { border: 1px solid #aaa; }
  
  .releve-table .student-info-row { background: #f0f8ff; font-weight: bold; }
  .releve-table .student-info-row td {
    border-top: 1px solid #aaa;
    border-bottom: 1px solid #aaa;
    border-left: none;
    border-right: none;
    padding: 2px 4px;
  }
  .releve-table .student-info-row td:first-child { border-left: 1px solid #aaa; }
  .releve-table .student-info-row td:last-child { border-right: 1px solid #aaa; }
  
  .releve-table .module-row { background: #d0e8f7; font-weight: bold; }
  .releve-table .module-row td {
    border-top: 1px solid #aaa;
    border-bottom: 1px solid #aaa;
    border-left: none;
    border-right: none;
    padding: 2px 4px;
  }
  .releve-table .module-row td:first-child { border-left: 1px solid #aaa; }
  .releve-table .module-row td:last-child { border-right: 1px solid #aaa; }
  
  .releve-table .subject-row td:first-child { text-align: left; padding-left: 20px; }
  .releve-table .subject-row td { padding: 1px 4px; }
  
  .status-C, .status-V { color: #27ae60; font-weight: bold; }
  .status-NC, .status-NV { color: #e74c3c; font-weight: bold; }
  
  .moyenne-row td { border: none !important; padding: 6px 4px 2px 4px; background: transparent; }
  
  .empty-state { text-align:center; padding:2rem 1rem; color:var(--text-light); }
  .empty-state i { font-size:3rem; margin-bottom:0.8rem; color:var(--primary-light); }
  
  .neutral-message {
    text-align: center;
    margin-top: 0.8rem;
    padding: 0.6rem;
    background: #e9ecef;
    color: #6c757d;
    border-radius: var(--radius);
    font-weight: normal;
  }
  
  .simple-table {
    width: 100%;
    border-collapse: collapse;
    margin: 0.8rem 0;
    font-size: 13px;
  }
  .simple-table th, .simple-table td {
    border: 1px solid #ddd;
    padding: 5px;
    text-align: center;
  }
  .simple-table th { background: var(--primary-light); font-weight: bold; }
  .simple-table td:first-child { text-align: left; }
  .section-subtitle {
    font-size: 1rem;
    color: var(--primary);
    margin: 0.8rem 0 0.3rem 0;
    padding-bottom: 0.2rem;
    border-bottom: 2px solid var(--primary-light);
  }
  
  .loading-spinner { text-align: center; padding: 2rem; }
  .loading-spinner i { font-size: 2.5rem; color: var(--primary); animation: spin 1s linear infinite; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  
  @media (max-width:768px) {
    .releve-table { font-size: 10px; }
    .releve-table th, .releve-table td { padding: 1px 3px; }
  }
</style>
</head>
<body>

<header>
  <div class="container">
    <h1><i class="fas fa-graduation-cap"></i> ISET - Relevé de Notes</h1>
    <p>Document officiel des résultats académiques</p>
  </div>
</header>

<div class="container">
  <div id="studentView" class="card">
    <div id="studentResults">
      <div class="loading-spinner">
        <i class="fas fa-spinner"></i>
        <p>Chargement des résultats...</p>
      </div>
    </div>
    <div id="pdfButtonContainer" style="text-align:center; margin-top:1rem;"></div>
  </div>
</div>

<footer class="footer" style="text-align:center; padding:1.5rem; color:#666;">
  <p>© 2025 ISET - Institut Supérieur d'Enseignement Technologique</p>
  <p style="margin-top:0.3rem; font-size:0.8rem;">Développé par Cheikh_A</p>
</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, child, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDnrW6WnmbEFpbWzlW9IGglxAafajt2Kyo",
    authDomain: "iset-b9974.firebaseapp.com",
    projectId: "iset-b9974",
    storageBucket: "iset-b9974.firebasestorage.app",
    messagingSenderId: "1054170284751",
    appId: "1:1054170284751:web:8f02232478430d5ae2adba",
    databaseURL: "https://iset-b9974-default-rtdb.firebaseio.com/"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const SUBJECTS_WITHOUT_TP = [
    "Anglais", "Anglais_2", "Français", "Français_2", "Français_s3",
    "Math_et_Statistique", "Economie", "Vulgarisation", "Technique_d_irrigation_et_BEC"
  ];

  const MODULES_STRUCTURE = {
    TC: {
      S1: {
        M11: { name: "Module 11", credit: 6.0, subjects: ["Anglais", "Français"] },
        M12: { name: "Module 12", credit: 8.0, subjects: ["Informatique", "Math_et_Statistique"] },
        M13: { name: "Module 13", credit: 8.0, subjects: ["Physique", "Chimie"] },
        M14: { name: "Module 14", credit: 8.0, subjects: ["Biologie", "Micro_et_Genetique"] }
      },
      S2: {
        M21: { name: "Module 21", credit: 6.0, subjects: ["Anglais_2", "Français_2"] },
        M22: { name: "Module 22", credit: 6.0, subjects: ["TIC", "PPV"] },
        M23: { name: "Module 23", credit: 6.0, subjects: ["PSA", "STA"] },
        M24: { name: "Module 24", credit: 6.0, subjects: ["GEM", "GAB"] }
      }
    },
    PPV: {
      S3: {
        M31: { name: "Module 31", credit: 6.0, subjects: ["Français_s3", "Economie"] },
        M32: { name: "Module 32", credit: 8.0, subjects: ["I_Agronomie", "I_Horticulture"] },
        M33: { name: "Module 33", credit: 8.0, subjects: ["Pesticides_agricoles", "Entomologie_et_Nemato"] },
        M34: { name: "Module 34", credit: 8.0, subjects: ["Science_des_sols", "Science_des_plantes"] }
      },
      S4: {
        M41: { name: "Module 41", credit: 3.0, subjects: ["Vulgarisation"] },
        M42: { name: "Module 42", credit: 7.0, subjects: ["Technique_de_propagation", "Technique_d_irrigation_et_BEC"] },
        M43: { name: "Module 43", credit: 7.0, subjects: ["Ecophysiologie_et_Biochimie", "Fertilite_du_sol"] },
        M44: { name: "Module 44", credit: 6.0, subjects: ["Methodes_de_diagnostic", "Malherbologie"] }
      }
    }
  };

  const SUBJECT_CREDITS = {
    TC: {
      S1: { "Anglais": 3.0, "Français": 3.0, "Informatique": 3.0, "Math_et_Statistique": 5.0, "Physique": 4.0, "Chimie": 4.0, "Biologie": 4.0, "Micro_et_Genetique": 4.0 },
      S2: { "Anglais_2": 3.0, "Français_2": 3.0, "TIC": 3.0, "PPV": 3.0, "PSA": 3.0, "STA": 3.0, "GEM": 3.0, "GAB": 3.0 }
    },
    PPV: {
      S3: { "Français_s3": 3.0, "Economie": 3.0, "I_Agronomie": 4.0, "I_Horticulture": 4.0, "Pesticides_agricoles": 4.0, "Entomologie_et_Nemato": 4.0, "Science_des_sols": 4.0, "Science_des_plantes": 4.0 },
      S4: { "Vulgarisation": 3.0, "Technique_de_propagation": 4.0, "Technique_d_irrigation_et_BEC": 3.0, "Ecophysiologie_et_Biochimie": 4.0, "Fertilite_du_sol": 3.0, "Methodes_de_diagnostic": 3.0, "Malherbologie": 3.0 }
    }
  };

  function hasTP(subjectName) { return !SUBJECTS_WITHOUT_TP.includes(subjectName); }
  function displaySubjectName(subject) { return subject.replace(/_/g, ' ').replace(/I_/g, 'I.').replace(/et_/g, 'et ').replace(/_s3/g, '').replace(/_2/g, ' 2'); }
  function escapeHtml(str) { if (!str) return ''; return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;'); }

  let currentData = null, currentStudentId = null, currentDept = null, currentSemester = null, currentStudentName = '';

  function calculateResultsFromNotes(notesBySubject, dept, semester) {
    const modulesStructure = MODULES_STRUCTURE[dept]?.[semester];
    if (!modulesStructure) return null;
    
    const requiredSubjects = [];
    for (let moduleCode in modulesStructure) for (let subject of modulesStructure[moduleCode].subjects) if (!requiredSubjects.includes(subject)) requiredSubjects.push(subject);
    
    const subjectAverages = {}, subjectStatus = {}, subjectHasSR = {};
    for (let subject of requiredSubjects) {
      const notes = notesBySubject[subject] || {};
      const hasTPforSubject = hasTP(subject);
      const exam = notes['Examen'] || 0, cc = notes['Contrôle continu'] || 0, tp = notes['TP'] || 0;
      const rattrapage = notes['Rattrapage'];
      const useSR = (rattrapage !== undefined && rattrapage > exam);
      subjectHasSR[subject] = useSR;
      const finalExam = useSR ? rattrapage : exam;
      let moyenne = hasTPforSubject ? (tp * 1 + cc * 2 + finalExam * 3) / 6 : (cc * 2 + finalExam * 3) / 5;
      subjectAverages[subject] = moyenne;
      subjectStatus[subject] = moyenne >= 10 ? 'C' : 'NC';
    }
    
    const moduleAverages = {}, moduleStatus = {}, moduleEarnedCredits = {};
    for (let moduleCode in modulesStructure) {
      const module = modulesStructure[moduleCode];
      let totalWeighted = 0, totalCredits = 0, earnedModuleCredits = 0;
      for (let subject of module.subjects) {
        const credit = SUBJECT_CREDITS[dept]?.[semester]?.[subject] || 3.0;
        totalWeighted += (subjectAverages[subject] || 0) * credit;
        totalCredits += credit;
        if (subjectStatus[subject] === 'C') earnedModuleCredits += credit;
      }
      const moduleMoyenne = totalCredits > 0 ? totalWeighted / totalCredits : 0;
      moduleAverages[moduleCode] = moduleMoyenne;
      let allC = true;
      for (let subject of module.subjects) if (subjectStatus[subject] !== 'C') allC = false;
      moduleStatus[moduleCode] = allC && moduleMoyenne >= 10 ? 'V' : 'NV';
      moduleEarnedCredits[moduleCode] = earnedModuleCredits;
    }
    
    let totalWeightedGeneral = 0, totalCreditsGeneral = 0;
    for (let subject of requiredSubjects) {
      const credit = SUBJECT_CREDITS[dept]?.[semester]?.[subject] || 3.0;
      totalWeightedGeneral += (subjectAverages[subject] || 0) * credit;
      totalCreditsGeneral += credit;
    }
    const generaleMoyenne = totalCreditsGeneral > 0 ? totalWeightedGeneral / totalCreditsGeneral : 0;
    
    let hasAnyNV = false;
    for (let moduleCode in moduleStatus) if (moduleStatus[moduleCode] === 'NV') { hasAnyNV = true; break; }
    const semestreStatus = hasAnyNV ? 'Non Validé' : (generaleMoyenne >= 10 ? 'Validé' : 'Non Validé');
    
    let hasAnySR = false;
    for (let subject of requiredSubjects) if (subjectHasSR[subject]) { hasAnySR = true; break; }
    
    const modules = {};
    for (let moduleCode in modulesStructure) {
      const module = modulesStructure[moduleCode];
      modules[moduleCode] = {
        name: module.name, moyenne: moduleAverages[moduleCode], status: moduleStatus[moduleCode],
        credit: module.credit, earnedCredits: moduleEarnedCredits[moduleCode],
        subjects: module.subjects.map(s => ({
          name: s, credit: SUBJECT_CREDITS[dept]?.[semester]?.[s] || 3.0,
          moyenne: subjectAverages[s], status: subjectStatus[s], hasTP: hasTP(s), useSR: subjectHasSR[s]
        }))
      };
    }
    
    return { moyenneGenerale: generaleMoyenne, semestreStatus, modules, hasAnySR, calculated: true };
  }

  async function loadAndDisplay() {
    const urlParams = new URLSearchParams(window.location.search);
    const dept = urlParams.get('dept'), sem = urlParams.get('sem'), id = urlParams.get('id'), name = urlParams.get('name');
    
    if (!dept || !sem || !id) {
      document.getElementById('studentResults').innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><h3>Lien invalide</h3><p>Veuillez utiliser le lien fourni par l'administration.</p></div>`;
      return;
    }
    
    currentDept = dept; currentSemester = sem; currentStudentId = id; currentStudentName = name ? decodeURIComponent(name) : '';
    
    try {
      const snapshot = await get(child(ref(db), `results/${dept}/${sem}/${id}`));
      if (!snapshot.exists()) {
        document.getElementById('studentResults').innerHTML = `<div class="empty-state"><i class="fas fa-user-graduate"></i><h3>Aucun résultat trouvé</h3><p>Aucune donnée n'a été trouvée pour cet étudiant.</p></div>`;
        return;
      }
      
      const studentData = snapshot.val();
      if (!currentStudentName) for (let key in studentData) if (studentData[key].name) { currentStudentName = studentData[key].name; break; }
      
      const notesBySubject = {};
      for (let key in studentData) { const data = studentData[key]; if (!notesBySubject[data.subject]) notesBySubject[data.subject] = {}; notesBySubject[data.subject][data.type] = data.grade; }
      
      const modulesStructure = MODULES_STRUCTURE[dept]?.[sem];
      let allSubjectsPresent = true;
      
      if (modulesStructure) {
        for (let moduleCode in modulesStructure) {
          for (let subject of modulesStructure[moduleCode].subjects) {
            const hasTPforSubject = hasTP(subject);
            const examExists = notesBySubject[subject] && notesBySubject[subject]['Examen'] !== undefined;
            const ccExists = notesBySubject[subject] && notesBySubject[subject]['Contrôle continu'] !== undefined;
            const tpExists = !hasTPforSubject || (notesBySubject[subject] && notesBySubject[subject]['TP'] !== undefined);
            if (!examExists || !ccExists || !tpExists) { allSubjectsPresent = false; break; }
          }
        }
      }
      
      currentData = { name: currentStudentName, grades: notesBySubject, raw: studentData };
      
      if (allSubjectsPresent && modulesStructure) {
        const results = calculateResultsFromNotes(notesBySubject, dept, sem);
        currentData.results = results;
        const showSRColumn = results.hasAnySR;
        
        let html = `
          <div class="student-header"><i class="fas fa-user-graduate"></i><h3>${escapeHtml(currentStudentName) || 'Étudiant'}</h3><p>N° ${escapeHtml(id)} | ${escapeHtml(dept)} | ${escapeHtml(sem)}</p></div>
          <div style="overflow-x:auto;">
            <table class="releve-table">
              <thead><tr><th>Numéro</th><th>Nom et Prénom</th><th>TP</th><th>CC</th><th>Examen</th>${showSRColumn ? '<th>SR</th>' : ''}<th>NFe</th><th>Crédit</th><th>Obs</th></tr></thead>
              <tbody>
                <tr class="student-info-row"><td>${escapeHtml(id)}</td><td style="text-align:left; padding-left:15px;">${escapeHtml(currentStudentName)}</td><td></td><td></td><td></td>${showSRColumn ? '<td></td>' : ''}<td></td><td></td><td></td></tr>
        `;
        
        for (let moduleCode in results.modules) {
          const module = results.modules[moduleCode];
          html += `
            <tr class="module-row"><td>${escapeHtml(moduleCode)}</td><td style="text-align:left; padding-left:15px;">${escapeHtml(module.name)}</td><td></td><td></td><td></td>${showSRColumn ? '<td></td>' : ''}<td style="font-weight:bold;">${module.moyenne.toFixed(2)}</td><td>${module.earnedCredits.toFixed(1)}</td><td class="${module.status === 'V' ? 'status-V' : 'status-NV'}">${module.status}</td></tr>
          `;
          
          for (let subject of module.subjects) {
            const grades = notesBySubject[subject.name] || {};
            const tpDisplay = subject.hasTP ? (grades['TP'] !== undefined ? grades['TP'].toFixed(2) : '') : '';
            const ccDisplay = grades['Contrôle continu'] !== undefined ? grades['Contrôle continu'].toFixed(2) : '';
            const examDisplay = grades['Examen'] !== undefined ? grades['Examen'].toFixed(2) : '';
            const rattrapage = grades['Rattrapage'];
            const srDisplay = (rattrapage !== undefined && rattrapage > (grades['Examen'] || 0)) ? rattrapage.toFixed(2) : '';
            
            html += `
              <tr class="subject-row"><td></td><td style="text-align:left; padding-left:30px;">${escapeHtml(displaySubjectName(subject.name))}</td><td>${tpDisplay}</td><td>${ccDisplay}</td><td>${examDisplay}</td>${showSRColumn ? `<td>${srDisplay}</td>` : ''}<td style="font-weight:bold;">${subject.moyenne.toFixed(2)}</td><td>${subject.credit.toFixed(1)}</td><td class="${subject.status === 'C' ? 'status-C' : 'status-NC'}">${subject.status}</td></tr>
            `;
          }
        }
        
        const colspanValue = showSRColumn ? 6 : 5;
        html += `<tr class="moyenne-row"><td colspan="${colspanValue}" style="text-align:right; font-weight:bold;">Moyenne Semestre :</td><td style="font-weight:bold;">${results.moyenneGenerale.toFixed(2)}</td><td></td><td class="${results.semestreStatus === 'Validé' ? 'status-V' : 'status-NV'}" style="font-weight:bold;">${results.semestreStatus}</td></tr></tbody></table></div>`;
        
        document.getElementById('studentResults').innerHTML = html;
        document.getElementById('pdfButtonContainer').innerHTML = `<button class="admin-btn success" onclick="window.generatePDF()"><i class="fas fa-file-pdf"></i> 📂 Télécharger mon relevé PDF</button>`;
        
      } else {
        let html = `<div class="student-header"><i class="fas fa-user-graduate"></i><h3>${escapeHtml(currentStudentName) || 'Étudiant'}</h3><p>N° ${escapeHtml(id)} | ${escapeHtml(dept)} | ${escapeHtml(sem)}</p></div><div class="neutral-message"><i class="fas fa-info-circle"></i> Les résultats ne sont pas encore finalisés par le coordinateur.</div>`;
        if (modulesStructure) {
          let hasTPData = false, tpHtml = '<h4 class="section-subtitle"><i class="fas fa-flask"></i> Résultats TP</h4><table class="simple-table"><thead><tr><th>Matière</th><th>Note TP</th></tr></thead><tbody>';
          for (let moduleCode in modulesStructure) for (let subject of modulesStructure[moduleCode].subjects) if (hasTP(subject)) { const grade = notesBySubject[subject]?.['TP']; if (grade !== undefined) hasTPData = true; tpHtml += `<tr><td>${escapeHtml(displaySubjectName(subject))}</td><td>${grade !== undefined ? grade.toFixed(2) : ''}</td></tr>`; }
          tpHtml += '</tbody></table>'; if (hasTPData) html += tpHtml;
          
          let ccHtml = '<h4 class="section-subtitle"><i class="fas fa-pencil-alt"></i> Résultats Contrôle continu</h4><table class="simple-table"><thead><tr><th>Matière</th><th>Note CC</th></tr></thead><tbody>';
          for (let moduleCode in modulesStructure) for (let subject of modulesStructure[moduleCode].subjects) { const grade = notesBySubject[subject]?.['Contrôle continu']; ccHtml += `<tr><td>${escapeHtml(displaySubjectName(subject))}</td><td>${grade !== undefined ? grade.toFixed(2) : ''}</td></tr>`; }
          ccHtml += '</tbody></table>'; html += ccHtml;
          
          let examHtml = '<h4 class="section-subtitle"><i class="fas fa-file-alt"></i> Résultats Examen</h4><table class="simple-table"><thead><tr><th>Matière</th><th>Note Examen</th></tr></thead><tbody>';
          for (let moduleCode in modulesStructure) for (let subject of modulesStructure[moduleCode].subjects) { const grade = notesBySubject[subject]?.['Examen']; examHtml += `<tr><td>${escapeHtml(displaySubjectName(subject))}</td><td>${grade !== undefined ? grade.toFixed(2) : ''}</td></tr>`; }
          examHtml += '</tbody></table>'; html += examHtml;
        }
        document.getElementById('studentResults').innerHTML = html;
        document.getElementById('pdfButtonContainer').innerHTML = '';
      }
    } catch (error) { console.error('Erreur:', error); document.getElementById('studentResults').innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle"></i><h3>Erreur de chargement</h3><p>Une erreur est survenue lors du chargement des résultats.</p></div>`; }
  }
  
  window.generatePDF = function() {
    if (!currentData || !currentData.results) { alert("Les résultats complets ne sont pas encore disponibles pour générer le PDF."); return; }
    
    const results = currentData.results, studentName = currentData.name;
    const currentYear = new Date().getFullYear(), academicYear = `${currentYear-1}-${currentYear}`;
    let filiere = currentDept === 'TC' ? 'L1TC-L1 Licence TC' : 'L2PPV-L2 Licence PPV';
    const showSRColumn = results.hasAnySR, colspanValue = showSRColumn ? 6 : 5;
    
    let content = `
      <div style="padding: 15mm 10mm 10mm 10mm; font-family: Arial, Helvetica, sans-serif; font-size: 11pt;">
        <div style="margin-bottom: 20px;">
          <div style="font-weight: bold; font-size: 12pt; margin-bottom: 5px;">Institut Supérieur d'Enseignement Technologique de Rosso</div>
          <div style="display: flex; justify-content: space-between; margin-top: 8px;"><span style="font-weight: bold; font-size: 14pt;">Résultats du ${currentSemester}</span><span style="font-weight: normal;">Année Universitaire : ${academicYear}</span></div>
          <div style="margin-top: 5px;"><span style="font-weight: bold;">Filière :</span> ${filiere}</div>
        </div>
        <table style="width:100%; border-collapse:collapse; border:1px solid #000; font-size:10pt; margin-top:10px;">
          <thead><tr style="background:#e8f4fc;"><th style="border:1px solid #000; padding:3px;">Numéro</th><th style="border:1px solid #000; padding:3px;">Nom et Prénom</th><th style="border:1px solid #000; padding:3px;">TP</th><th style="border:1px solid #000; padding:3px;">CC</th><th style="border:1px solid #000; padding:3px;">Examen</th>${showSRColumn ? '<th style="border:1px solid #000; padding:3px;">SR</th>' : ''}<th style="border:1px solid #000; padding:3px;">NF°</th><th style="border:1px solid #000; padding:3px;">Crédit</th><th style="border:1px solid #000; padding:3px;">Obs</th></tr></thead>
          <tbody>
            <tr style="background:#f0f8ff;"><td style="border:none; border-top:1px solid #000; border-bottom:1px solid #000; border-left:1px solid #000; border-right:1px solid #000; padding:2px;">${escapeHtml(currentStudentId)}</td><td style="border:none; border-top:1px solid #000; border-bottom:1px solid #000; padding:2px; text-align:left;">${escapeHtml(studentName)}</td><td style="border:none; border-top:1px solid #000; border-bottom:1px solid #000; padding:2px;"></td><td style="border:none; border-top:1px solid #000; border-bottom:1px solid #000; padding:2px;"></td><td style="border:none; border-top:1px solid #000; border-bottom:1px solid #000; padding:2px;"></td>${showSRColumn ? '<td style="border:none; border-top:1px solid #000; border-bottom:1px solid #000; padding:2px;"></td>' : ''}<td style="border:none; border-top:1px solid #000; border-bottom:1px solid #000; padding:2px;"></td><td style="border:none; border-top:1px solid #000; border-bottom:1px solid #000; padding:2px;"></td><td style="border:none; border-top:1px solid #000; border-bottom:1px solid #000; border-right:1px solid #000; padding:2px;"></td></tr>
    `;
    
    for (let moduleCode in results.modules) {
      const module = results.modules[moduleCode];
      content += `<tr style="background:#d0e8f7;"><td style="border:none; border-top:1px solid #000; border-bottom:1px solid #000; border-left:1px solid #000; padding:2px;">${escapeHtml(moduleCode)}</td><td style="border:none; border-top:1px solid #000; border-bottom:1px solid #000; padding:2px; text-align:left;">${escapeHtml(module.name)}</td><td style="border:none; border-top:1px solid #000; border-bottom:1px solid #000; padding:2px;"></td><td style="border:none; border-top:1px solid #000; border-bottom:1px solid #000; padding:2px;"></td><td style="border:none; border-top:1px solid #000; border-bottom:1px solid #000; padding:2px;"></td>${showSRColumn ? '<td style="border:none; border-top:1px solid #000; border-bottom:1px solid #000; padding:2px;"></td>' : ''}<td style="border:none; border-top:1px solid #000; border-bottom:1px solid #000; padding:2px; font-weight:bold;">${module.moyenne.toFixed(2)}</td><td style="border:none; border-top:1px solid #000; border-bottom:1px solid #000; padding:2px;">${module.earnedCredits.toFixed(1)}</td><td style="border:none; border-top:1px solid #000; border-bottom:1px solid #000; border-right:1px solid #000; padding:2px;">${module.status}</td></tr>`;
      
      for (let subject of module.subjects) {
        const grades = currentData.grades[subject.name] || {};
        const tpDisplay = subject.hasTP ? (grades['TP'] !== undefined ? grades['TP'].toFixed(2) : '') : '';
        const ccDisplay = grades['Contrôle continu'] !== undefined ? grades['Contrôle continu'].toFixed(2) : '';
        const examDisplay = grades['Examen'] !== undefined ? grades['Examen'].toFixed(2) : '';
        const rattrapage = grades['Rattrapage'];
        const srDisplay = (rattrapage !== undefined && rattrapage > (grades['Examen'] || 0)) ? rattrapage.toFixed(2) : '';
        
        content += `<tr><td style="border:1px solid #000; padding:1px;"></td><td style="border:1px solid #000; padding:1px; text-align:left; padding-left:20px;">${escapeHtml(displaySubjectName(subject.name))}</td><td style="border:1px solid #000; padding:1px;">${tpDisplay}</td><td style="border:1px solid #000; padding:1px;">${ccDisplay}</td><td style="border:1px solid #000; padding:1px;">${examDisplay}</td>${showSRColumn ? `<td style="border:1px solid #000; padding:1px;">${srDisplay}</td>` : ''}<td style="border:1px solid #000; padding:1px; font-weight:bold;">${subject.moyenne.toFixed(2)}</td><td style="border:1px solid #000; padding:1px;">${subject.credit.toFixed(1)}</td><td style="border:1px solid #000; padding:1px;">${subject.status}</td></tr>`;
      }
    }
    
    content += `<tr class="moyenne-row"><td colspan="${colspanValue}" style="border:none; padding:6px 4px 2px 4px; text-align:right; font-weight:bold;">Moyenne Semestre :</td><td style="border:none; padding:6px 4px 2px 4px; font-weight:bold;">${results.moyenneGenerale.toFixed(2)}</td><td style="border:none; padding:6px 4px 2px 4px;"></td><td style="border:none; padding:6px 4px 2px 4px; font-weight:bold;">${results.semestreStatus}</td></tr></tbody></table></div>`;
    
    const element = document.createElement('div'); element.innerHTML = content; document.body.appendChild(element);
    const opt = { margin: [0, 5, 5, 5], filename: `Releve_${currentStudentId}_${currentSemester}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, letterRendering: true, scrollY: 0 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
    html2pdf().set(opt).from(element).save().then(() => document.body.removeChild(element)).catch(err => { console.error('Erreur PDF:', err); alert('Erreur lors de la génération du PDF.'); document.body.removeChild(element); });
  };
  
  loadAndDisplay();
</script>
</body>
</html>
