  const firebaseConfig = {
    apiKey: "AIzaSyDnrW6WnmbEFpbWzlW9IGglxAafajt2Kyo",

    projectId: "iset-b9974",
    storageBucket: "iset-b9974.firebasestorage.app",
    messagingSenderId: "1054170284751",
    appId: "1:1054170284751:web:8f02232478430d5ae2adba",

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

<style>
  :root {
    --primary: #0077b6;
    --primary-dark: #005f87;
    --primary-light: #caf0f8;
    --secondary: #0096c7;
    --light: #f5f7fa;
    --white: #ffffff;
    --text: #333333;
    --text-light: #666666;
    --shadow: 0 4px 12px rgba(0,0,0,0.1);
    --radius: 10px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { 
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    background:var(--light); 
    color:var(--text); 
    line-height:1.6;
  }
  header { 
    background:linear-gradient(135deg,var(--primary),var(--secondary)); 
    color:var(--white); 
    padding:2rem 1rem; 
    text-align:center; 
  }
  .container { max-width:1200px; margin:0 auto; padding:0 1rem; }
  .card {
    background:var(--white);
    border-radius:var(--radius);
    padding:1.5rem;
    margin:1rem 0;
    box-shadow:var(--shadow);
  }
  .admin-btn {
    padding:0.8rem 1.5rem;
    background:#f0f0f0;
    color:#333;
    border:1px solid #ccc;
    border-radius:var(--radius);
    font-size:1rem;
    font-weight:600;
    cursor:pointer;
    margin:0.3rem;
    transition:all 0.3s ease;
  }
  .admin-btn:hover { background:#e0e0e0; transform:translateY(-1px); }
  .admin-btn.success { background:#d4edda; border-color:#28a745; color:#155724; }
  
  .student-header { text-align:center; margin-bottom:1.5rem; padding-bottom:1rem; border-bottom:2px solid var(--primary-light); }
  .student-header i { font-size:3rem; color:var(--primary); margin-bottom:0.5rem; }
  
  .releve-table {
    width: 100%;
    border-collapse: collapse;
    margin: 1rem 0;
    font-size: 13px;
  }
  .releve-table th, .releve-table td {
    border: 1px solid #ddd;
    padding: 8px 6px;
    text-align: center;
  }
  .releve-table th {
    background: var(--primary-light);
    font-weight: bold;
  }
  .releve-table .module-row {
    background: #e8f4fc;
    font-weight: bold;
  }
  .releve-table .subject-row td:first-child {
    text-align: left;
    padding-left: 25px;
  }
  .status-C, .status-V { color: #27ae60; font-weight: bold; }
  .status-NC, .status-NV { color: #e74c3c; font-weight: bold; }
  .student-info-row { background: #f0f8ff; font-weight: bold; }
  
  .empty-state { text-align:center; padding:3rem 1rem; color:var(--text-light); }
  .empty-state i { font-size:4rem; margin-bottom:1rem; color:var(--primary-light); }
  
  .neutral-message {
    text-align: center;
    margin-top: 1rem;
    padding: 0.8rem;
    background: #e9ecef;
    color: #6c757d;
    border-radius: var(--radius);
    font-weight: normal;
  }
  
  .simple-table {
    width: 100%;
    border-collapse: collapse;
    margin: 1rem 0;
    font-size: 14px;
  }
  .simple-table th, .simple-table td {
    border: 1px solid #ddd;
    padding: 8px;
    text-align: center;
  }
  .simple-table th {
    background: var(--primary-light);
    font-weight: bold;
  }
  .simple-table td:first-child {
    text-align: left;
  }
  .section-subtitle {
    font-size: 1.1rem;
    color: var(--primary);
    margin: 1rem 0 0.5rem 0;
    padding-bottom: 0.3rem;
    border-bottom: 2px solid var(--primary-light);
  }
  
  @media (max-width:768px) {
    .releve-table { font-size: 11px; }
    .releve-table th, .releve-table td { padding: 6px 4px; }
  }
</style>
</head>
<body>

<header>
  <div class="container">
    <h1><i class="fas fa-graduation-cap"></i> ISET Rosso - Relevé de Notes</h1>
    <p>Document officiel des résultats académiques</p>
  </div>
</header>

<div class="container">
  <div id="studentView" class="card">
    <div id="studentResults"></div>
    <div id="pdfButtonContainer" style="text-align:center; margin-top:1.5rem;"></div>
  </div>
</div>

<footer class="footer" style="text-align:center; padding:2rem; color:#666;">
  <p>© 2024 ISET Rosso - Institut Supérieur d'Enseignement Technologique</p>
</footer>

<script>
  // ==================== CONFIGURATION ====================
  const SUBJECTS_WITHOUT_TP = [
    "Anglais", "Anglais 2", "Français", "Français 2", "Français 3",
    "Math et Statistique", "Économie", "Vulgarisation", "Technique d'irrigation et BEC"
  ];

  function hasTP(subjectName) { return !SUBJECTS_WITHOUT_TP.includes(subjectName); }

  // هيكل المواد والموديولات
  const MODULES_STRUCTURE = {
    TC: {
      S1: {
        M11: { name: "Module 11", credit: 6.0, subjects: ["Anglais", "Français"] },
        M12: { name: "Module 12", credit: 8.0, subjects: ["Informatique", "Math et Statistique"] },
        M13: { name: "Module 13", credit: 8.0, subjects: ["Physique", "Chimie"] },
        M14: { name: "Module 14", credit: 8.0, subjects: ["Biologie", "Micro et Génétique"] }
      },
      S2: {
        M21: { name: "Module 21", credit: 6.0, subjects: ["Anglais 2", "Français 2"] },
        M22: { name: "Module 22", credit: 6.0, subjects: ["TIC", "PPV"] },
        M23: { name: "Module 23", credit: 6.0, subjects: ["PSA", "STA"] },
        M24: { name: "Module 24", credit: 6.0, subjects: ["GEM", "GAB"] }
      }
    },
    PPV: {
      S3: {
        M31: { name: "Module 31", credit: 6.0, subjects: ["Français 3", "Économie"] },
        M32: { name: "Module 32", credit: 8.0, subjects: ["I.Agronomie", "I.Horticulture"] },
        M33: { name: "Module 33", credit: 8.0, subjects: ["Pesticides agricoles", "Entomologie et Nemato"] },
        M34: { name: "Module 34", credit: 8.0, subjects: ["Science des sols", "Science des plantes"] }
      },
      S4: {
        M41: { name: "Module 41", credit: 3.0, subjects: ["Vulgarisation"] },
        M42: { name: "Module 42", credit: 7.0, subjects: ["Technique de propagation", "Technique d'irrigation et BEC"] },
        M43: { name: "Module 43", credit: 7.0, subjects: ["Ecophysiologie et Biochimie", "Fertilité du sol"] },
        M44: { name: "Module 44", credit: 6.0, subjects: ["Méthodes de diagnostic", "Malherbologie"] }
      }
    }
  };

  const SUBJECT_CREDITS = {
    TC: {
      S1: { "Anglais": 3.0, "Français": 3.0, "Informatique": 3.0, "Math et Statistique": 5.0, "Physique": 4.0, "Chimie": 4.0, "Biologie": 4.0, "Micro et Génétique": 4.0 },
      S2: { "Anglais 2": 3.0, "Français 2": 3.0, "TIC": 3.0, "PPV": 3.0, "PSA": 3.0, "STA": 3.0, "GEM": 3.0, "GAB": 3.0 }
    },
    PPV: {
      S3: { "Français 3": 3.0, "Économie": 3.0, "I.Agronomie": 4.0, "I.Horticulture": 4.0, "Pesticides agricoles": 4.0, "Entomologie et Nemato": 4.0, "Science des sols": 4.0, "Science des plantes": 4.0 },
      S4: { "Vulgarisation": 3.0, "Technique de propagation": 4.0, "Technique d'irrigation et BEC": 3.0, "Ecophysiologie et Biochimie": 4.0, "Fertilité du sol": 3.0, "Méthodes de diagnostic": 3.0, "Malherbologie": 3.0 }
    }
  };

  let currentData = null;
  let currentStudentId = null;
  let currentDept = null;
  let currentSemester = null;

  // دالة حساب النتائج من البيانات الخام
  function calculateResultsFromNotes(notesBySubject, dept, semester) {
    const modulesStructure = MODULES_STRUCTURE[dept]?.[semester];
    if (!modulesStructure) return null;
    
    const requiredSubjects = [];
    for (let moduleCode in modulesStructure) {
      for (let subject of modulesStructure[moduleCode].subjects) {
        if (!requiredSubjects.includes(subject)) requiredSubjects.push(subject);
      }
    }
    
    // حساب معدلات المواد
    const subjectAverages = {};
    const subjectStatus = {};
    
    for (let subject of requiredSubjects) {
      const notes = notesBySubject[subject] || {};
      const hasTPforSubject = hasTP(subject);
      const exam = notes['Examen'] || 0;
      const cc = notes['Contrôle continu'] || 0;
      const tp = notes['TP'] || 0;
      const rattrapage = notes['Rattrapage'];
      const finalExam = (rattrapage !== undefined && rattrapage > exam) ? rattrapage : exam;
      
      let moyenne;
      if (hasTPforSubject) {
        moyenne = (tp * 1 + cc * 2 + finalExam * 3) / 6;
      } else {
        moyenne = (cc * 2 + finalExam * 3) / 5;
      }
      subjectAverages[subject] = moyenne;
      subjectStatus[subject] = moyenne >= 10 ? 'C' : 'NC';
    }
    
    // حساب معدلات الموديولات
    const moduleAverages = {};
    const moduleStatus = {};
    
    for (let moduleCode in modulesStructure) {
      const module = modulesStructure[moduleCode];
      let totalWeighted = 0;
      let totalCredits = 0;
      for (let subject of module.subjects) {
        const credit = SUBJECT_CREDITS[dept]?.[semester]?.[subject] || 3.0;
        totalWeighted += (subjectAverages[subject] || 0) * credit;
        totalCredits += credit;
      }
      const moduleMoyenne = totalCredits > 0 ? totalWeighted / totalCredits : 0;
      moduleAverages[moduleCode] = moduleMoyenne;
      
      let allC = true;
      for (let subject of module.subjects) {
        if (subjectStatus[subject] !== 'C') allC = false;
      }
      moduleStatus[moduleCode] = allC && moduleMoyenne >= 10 ? 'V' : 'NV';
    }
    
    // حساب المعدل العام
    let totalWeightedGeneral = 0;
    let totalCreditsGeneral = 0;
    for (let subject of requiredSubjects) {
      const credit = SUBJECT_CREDITS[dept]?.[semester]?.[subject] || 3.0;
      totalWeightedGeneral += (subjectAverages[subject] || 0) * credit;
      totalCreditsGeneral += credit;
    }
    const generaleMoyenne = totalCreditsGeneral > 0 ? totalWeightedGeneral / totalCreditsGeneral : 0;
    const semestreStatus = generaleMoyenne >= 10 ? 'Validé' : 'Non Validé';
    
    // بناء كائن النتائج
    const modules = {};
    for (let moduleCode in modulesStructure) {
      const module = modulesStructure[moduleCode];
      modules[moduleCode] = {
        name: module.name,
        moyenne: moduleAverages[moduleCode],
        status: moduleStatus[moduleCode],
        credit: module.credit,
        subjects: module.subjects.map(s => ({
          name: s,
          credit: SUBJECT_CREDITS[dept]?.[semester]?.[s] || 3.0,
          moyenne: subjectAverages[s],
          status: subjectStatus[s],
          hasTP: hasTP(s)
        }))
      };
    }
    
    return {
      moyenneGenerale: generaleMoyenne,
      semestreStatus: semestreStatus,
      modules: modules,
      calculated: true
    };
  }

  // عرض النتائج
  async function loadAndDisplay() {
    const urlParams = new URLSearchParams(window.location.search);
    const dept = urlParams.get('dept');
    const sem = urlParams.get('sem');
    const id = urlParams.get('id');
    const name = urlParams.get('name');
    
    if (!dept || !sem || !id) {
      document.getElementById('studentResults').innerHTML = `
        <div class="empty-state">
          <i class="fas fa-exclamation-triangle"></i>
          <h3>Lien invalide</h3>
          <p>Veuillez utiliser le lien fourni par l'administration.</p>
        </div>
      `;
      return;
    }
    
    currentDept = dept;
    currentSemester = sem;
    currentStudentId = id;
    
    document.getElementById('studentResults').innerHTML = '<div class="empty-state"><i class="fas fa-spinner fa-pulse"></i><h3>Chargement...</h3></div>';
    
    try {
      // جلب البيانات من Firebase
      const snapshot = await window.get(window.child(window.ref(window.db), `results/${dept}/${sem}/${id}`));
      
      if (!snapshot.exists()) {
        document.getElementById('studentResults').innerHTML = `
          <div class="empty-state">
            <i class="fas fa-user-graduate"></i>
            <h3>Aucun résultat trouvé</h3>
            <p>Aucune donnée n'a été trouvée pour cet étudiant.</p>
          </div>
        `;
        return;
      }
      
      const studentData = snapshot.val();
      let studentName = name || '';
      for (let key in studentData) {
        if (studentData[key].name && !studentName) studentName = studentData[key].name;
      }
      
      // تنظيم النوتات
      const notesBySubject = {};
      for (let key in studentData) {
        const data = studentData[key];
        if (!notesBySubject[data.subject]) notesBySubject[data.subject] = {};
        notesBySubject[data.subject][data.type] = data.grade;
      }
      
      // التحقق من اكتمال جميع المواد
      const modulesStructure = MODULES_STRUCTURE[dept]?.[sem];
      let allSubjectsPresent = true;
      if (modulesStructure) {
        for (let moduleCode in modulesStructure) {
          for (let subject of modulesStructure[moduleCode].subjects) {
            const hasTPforSubject = hasTP(subject);
            const examExists = notesBySubject[subject] && notesBySubject[subject]['Examen'] !== undefined;
            const ccExists = notesBySubject[subject] && notesBySubject[subject]['Contrôle continu'] !== undefined;
            const tpExists = !hasTPforSubject || (notesBySubject[subject] && notesBySubject[subject]['TP'] !== undefined);
            if (!examExists || !ccExists || !tpExists) {
              allSubjectsPresent = false;
              break;
            }
          }
        }
      }
      
      if (allSubjectsPresent && modulesStructure) {
        // حساب النتائج
        const results = calculateResultsFromNotes(notesBySubject, dept, sem);
        currentData = { name: studentName, grades: notesBySubject, results: results, calculated: true };
        
        // عرض الجدول النهائي
        let html = `
          <div class="student-header">
            <i class="fas fa-user-graduate"></i>
            <h3>${studentName || 'Étudiant'}</h3>
            <p>N° ${id} | ${dept} | ${sem}</p>
          </div>
        `;
        
        html += '<div style="overflow-x:auto;"><table class="releve-table">';
        html += '<thead><tr>';
        html += '<th>Numéro</th><th>Nom et Prénom</th><th>TP</th><th>CC</th><th>Examen</th><th>NFe</th><th>Crédit</th><th>Observations</th>';
        html += '</thead><tbody>';
        
        // Ligne étudiant
        html += `<tr class="student-info-row">
          <td>${id}</td>
          <td style="text-align:left; padding-left:15px;">${studentName}</td>
          <td style="text-align:center;">-</td><td style="text-align:center;">-</td><td style="text-align:center;">-</td>
          <td style="font-weight:bold;">Moy Sem: ${results.moyenneGenerale.toFixed(2)}</td>
          <td style="text-align:center;">-</td>
          <td class="${results.semestreStatus === 'Validé' ? 'status-V' : 'status-NV'}">${results.semestreStatus}</td>
        </table>`;
        
        // Modules et matières
        for (let moduleCode in results.modules) {
          const module = results.modules[moduleCode];
          html += `<tr class="module-row">
            <td>${moduleCode}</td>
            <td style="text-align:left; padding-left:15px;">${module.name}</td>
            <td style="text-align:center;">-</td><td style="text-align:center;">-</td><td style="text-align:center;">-</td>
            <td style="font-weight:bold;">${module.moyenne.toFixed(2)}</td>
            <td style="text-align:center;">${module.credit}</td>
            <td class="${module.status === 'V' ? 'status-V' : 'status-NV'}">${module.status}</td>
          </tr>`;
          
          for (let subject of module.subjects) {
            const grades = notesBySubject[subject.name] || {};
            const tpDisplay = subject.hasTP ? (grades['TP'] !== undefined ? grades['TP'].toFixed(2) : '-') : '-';
            const creditEarned = subject.status === 'C' ? subject.credit : 0;
            
            html += `<tr class="subject-row">
              <td style="text-align:center;">-</td>
              <td style="text-align:left; padding-left:40px;">${subject.name}</td>
              <td style="text-align:center;">${tpDisplay}</td>
              <td style="text-align:center;">${grades['Contrôle continu'] !== undefined ? grades['Contrôle continu'].toFixed(2) : '-'}</td>
              <td style="text-align:center;">${grades['Examen'] !== undefined ? grades['Examen'].toFixed(2) : '-'}</td>
              <td style="font-weight:bold;">${subject.moyenne.toFixed(2)}</td>
              <td style="text-align:center;">${creditEarned.toFixed(1)}</td>
              <td class="${subject.status === 'C' ? 'status-C' : 'status-NC'}">${subject.status}</td>
            </tr>`;
          }
        }
        
        html += '</tbody></table></div>';
        
        document.getElementById('studentResults').innerHTML = html;
        document.getElementById('pdfButtonContainer').innerHTML = `
          <button class="admin-btn success" onclick="generateFinalPDF()">
            <i class="fas fa-file-pdf"></i> 📂 Télécharger mon relevé PDF
          </button>
        `;
        
      } else {
        // عرض الجداول المنفصلة (TP, CC, Examen) قبل اكتمال المواد
        let html = `
          <div class="student-header">
            <i class="fas fa-user-graduate"></i>
            <h3>${studentName || 'Étudiant'}</h3>
            <p>N° ${id} | ${dept} | ${sem}</p>
          </div>
          <div class="neutral-message">
            <i class="fas fa-info-circle"></i> Les résultats ne sont pas encore finalisés par le coordinateur.
          </div>
        `;
        
        // جدول TP
        let hasTPData = false;
        let tpHtml = '<h4 class="section-subtitle">Résultats TP</h4><table class="simple-table"><thead><tr><th>Matière</th><th>Note TP</th></tr></thead><tbody>';
        for (let moduleCode in modulesStructure) {
          for (let subject of modulesStructure[moduleCode].subjects) {
            if (hasTP(subject)) {
              const grade = notesBySubject[subject]?.['TP'];
              if (grade !== undefined) hasTPData = true;
              tpHtml += `<tr><td>${subject}</td><td style="text-align:center;">${grade !== undefined ? grade.toFixed(2) : '-'}</td></tr>`;
            }
          }
        }
        tpHtml += '</tbody>赶';
        if (hasTPData) html += tpHtml;
        
        // جدول CC
        let ccHtml = '<h4 class="section-subtitle">Résultats Contrôle continu</h4><table class="simple-table"><thead><tr><th>Matière</th><th>Note CC</th></tr></thead><tbody>';
        for (let moduleCode in modulesStructure) {
          for (let subject of modulesStructure[moduleCode].subjects) {
            const grade = notesBySubject[subject]?.['Contrôle continu'];
            ccHtml += `<tr><td>${subject}</td><td style="text-align:center;">${grade !== undefined ? grade.toFixed(2) : '-'}</td></tr>`;
          }
        }
        ccHtml += '</tbody>赶';
        html += ccHtml;
        
        // جدول Examen
        let examHtml = '<h4 class="section-subtitle">Résultats Examen</h4><table class="simple-table"><thead><tr><th>Matière</th><th>Note Examen</th></tr></thead><tbody>';
        for (let moduleCode in modulesStructure) {
          for (let subject of modulesStructure[moduleCode].subjects) {
            const grade = notesBySubject[subject]?.['Examen'];
            examHtml += `<tr><td>${subject}</td><td style="text-align:center;">${grade !== undefined ? grade.toFixed(2) : '-'}</td></tr>`;
          }
        }
        examHtml += '</tbody>赶';
        html += examHtml;
        
        document.getElementById('studentResults').innerHTML = html;
        document.getElementById('pdfButtonContainer').innerHTML = '';
      }
      
    } catch (error) {
      console.error('Erreur:', error);
      document.getElementById('studentResults').innerHTML = `
        <div class="empty-state">
          <i class="fas fa-exclamation-circle"></i>
          <h3>Erreur de chargement</h3>
          <p>Une erreur est survenue lors du chargement des données.</p>
        </div>
      `;
    }
  }
  
  function generateFinalPDF() {
    if (!currentData || !currentData.results) {
      alert("Les résultats ne sont pas encore disponibles.");
      return;
    }
    
    const results = currentData.results;
    const studentName = currentData.name;
    const semesterName = currentSemester;
    
    let content = `
      <div style="padding: 15mm; font-family: 'Times New Roman', Times, serif; font-size:12px;">
        <div style="text-align:center; margin-bottom:20px;">
          <h2>République Islamique de Mauritanie</h2>
          <h3>Ministère de l'Enseignement Supérieur et de la Recherche Scientifique</h3>
          <h3>Institut Supérieur d'Enseignement Technologique de Rosso</h3>
          <hr style="margin:15px 0">
          <h1 style="color:#0077b6;">RELEVÉ DE NOTES</h1>
          <h3>Semestre ${currentSemester}</h3>
          <h3>Année académique 2024-2025</h3>
        </div>
        
        <table style="width:100%; border-collapse:collapse; margin-bottom:20px;">
          <tr><td style="padding:5px;"><strong>Étudiant(e) :</strong> ${studentName}</td>
              <td style="padding:5px;"><strong>N° d'étudiant :</strong> ${currentStudentId}</td>
              <td style="padding:5px;"><strong>Département :</strong> ${currentDept}</td>
          </tr>
        </table>
        
        <table style="width:100%; border-collapse:collapse; border:1px solid #000;">
          <thead>
            <tr style="background:#caf0f8;">
              <th style="border:1px solid #000; padding:8px;">Numéro</th>
              <th style="border:1px solid #000; padding:8px;">Nom et Prénom</th>
              <th style="border:1px solid #000; padding:8px;">TP</th>
              <th style="border:1px solid #000; padding:8px;">CC</th>
              <th style="border:1px solid #000; padding:8px;">Examen</th>
              <th style="border:1px solid #000; padding:8px;">NFe</th>
              <th style="border:1px solid #000; padding:8px;">Crédit</th>
              <th style="border:1px solid #000; padding:8px;">Observations</th>
            </tr>
          </thead>
          <tbody>
    `;
    
    content += `<tr style="background:#f0f8ff;">
      <td style="border:1px solid #000; padding:8px;">${currentStudentId}</td>
      <td style="border:1px solid #000; padding:8px; text-align:left;">${studentName}</td>
      <td style="border:1px solid #000; padding:8px;">-</td><td style="border:1px solid #000; padding:8px;">-</td><td style="border:1px solid #000; padding:8px;">-</td>
      <td style="border:1px solid #000; padding:8px; font-weight:bold;">Moy Sem: ${results.moyenneGenerale.toFixed(2)}</td>
      <td style="border:1px solid #000; padding:8px;">-</td>
      <td style="border:1px solid #000; padding:8px; font-weight:bold;">${results.semestreStatus}</td>
    </tr>`;
    
    for (let moduleCode in results.modules) {
      const module = results.modules[moduleCode];
      content += `<tr style="background:#e8f4fc;">
        <td style="border:1px solid #000; padding:8px;">${moduleCode}</td>
        <td style="border:1px solid #000; padding:8px; text-align:left;">${module.name}</td>
        <td style="border:1px solid #000; padding:8px;">-</td><td style="border:1px solid #000; padding:8px;">-</td><td style="border:1px solid #000; padding:8px;">-</td>
        <td style="border:1px solid #000; padding:8px; font-weight:bold;">${module.moyenne.toFixed(2)}</td>
        <td style="border:1px solid #000; padding:8px;">${module.credit}</td>
        <td style="border:1px solid #000; padding:8px;">${module.status}</td>
      </tr>`;
      
      for (let subject of module.subjects) {
        const grades = currentData.grades[subject.name] || {};
        const tpDisplay = subject.hasTP ? (grades['TP'] !== undefined ? grades['TP'].toFixed(2) : '-') : '-';
        const creditEarned = subject.status === 'C' ? subject.credit : 0;
        
        content += `<tr>
          <td style="border:1px solid #000; padding:8px;">-</td>
          <td style="border:1px solid #000; padding:8px; text-align:left; padding-left:20px;">${subject.name}</td>
          <td style="border:1px solid #000; padding:8px;">${tpDisplay}</td>
          <td style="border:1px solid #000; padding:8px;">${grades['Contrôle continu'] !== undefined ? grades['Contrôle continu'].toFixed(2) : '-'}</td>
          <td style="border:1px solid #000; padding:8px;">${grades['Examen'] !== undefined ? grades['Examen'].toFixed(2) : '-'}</td>
          <td style="border:1px solid #000; padding:8px; font-weight:bold;">${subject.moyenne.toFixed(2)}</td>
          <td style="border:1px solid #000; padding:8px;">${creditEarned.toFixed(1)}</td>
          <td style="border:1px solid #000; padding:8px;">${subject.status}</td>
        </tr>`;
      }
    }
    
    content += `
          </tbody>
        </table>
        
        <div style="margin-top:30px;">
          <p style="text-align:right;">Fait à Rosso, le ${new Date().toLocaleDateString('fr-FR')}</p>
          <div style="text-align:right; margin-top:30px;">
            <p>Le Chef du Service Scolarité</p>
            <div style="border-top:1px solid #000; width:200px; margin-top:5px; margin-left:auto;"></div>
          </div>
        </div>
      </div>
    `;
    
    const element = document.createElement('div');
    element.innerHTML = content;
    document.body.appendChild(element);
    
    html2pdf().set({ 
      margin: 0, 
      filename: `Releve_${currentStudentId}_${currentSemester}.pdf`, 
      image: { type: 'jpeg', quality: 0.98 }, 
      html2canvas: { scale: 2 }, 
      jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } 
    }).from(element).save().then(() => { 
      document.body.removeChild(element); 
    });
  }
  
  window.generateFinalPDF = generateFinalPDF;
  
  // تشغيل التحميل
  loadAndDisplay();
</script>
</body>
</html>
