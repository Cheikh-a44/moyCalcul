<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relevé de Notes - ISET Rosso</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  :root {
    --primary: #0077b6;
    --primary-dark: #005f87;
    --primary-light: #caf0f8;
    --secondary: #0096c7;
    --light: #f5f7fa;
    --white: #ffffff;
    --text: #333333;
    --text-light: #666666;
    --shadow: 0 4px 12px rgba(0,0,0,0.1);
    --radius: 10px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { 
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    background:var(--light); 
    color:var(--text); 
    line-height:1.6;
  }
  header { 
    background:linear-gradient(135deg,var(--primary),var(--secondary)); 
    color:var(--white); 
    padding:2rem 1rem; 
    text-align:center; 
  }
  .container { max-width:1200px; margin:0 auto; padding:0 1rem; }
  .card {
    background:var(--white);
    border-radius:var(--radius);
    padding:1.5rem;
    margin:1rem 0;
    box-shadow:var(--shadow);
  }
  .admin-btn {
    padding:0.8rem 1.5rem;
    background:#f0f0f0;
    color:#333;
    border:1px solid #ccc;
    border-radius:var(--radius);
    font-size:1rem;
    font-weight:600;
    cursor:pointer;
    margin:0.3rem;
    transition:all 0.3s ease;
  }
  .admin-btn:hover { background:#e0e0e0; transform:translateY(-1px); }
  .admin-btn.success { background:#d4edda; border-color:#28a745; color:#155724; }
  
  .student-header { text-align:center; margin-bottom:1.5rem; padding-bottom:1rem; border-bottom:2px solid var(--primary-light); }
  .student-header i { font-size:3rem; color:var(--primary); margin-bottom:0.5rem; }
  
  .releve-table {
    width: 100%;
    border-collapse: collapse;
    margin: 1rem 0;
    font-size: 13px;
  }
  .releve-table th, .releve-table td {
    border: 1px solid #ddd;
    padding: 8px 6px;
    text-align: center;
  }
  .releve-table th {
    background: var(--primary-light);
    font-weight: bold;
  }
  .releve-table .module-row {
    background: #e8f4fc;
    font-weight: bold;
  }
  .releve-table .subject-row td:first-child {
    text-align: left;
    padding-left: 25px;
  }
  .status-C, .status-V { color: #27ae60; font-weight: bold; }
  .status-NC, .status-NV { color: #e74c3c; font-weight: bold; }
  .student-info-row { background: #f0f8ff; font-weight: bold; }
  
  .empty-state { text-align:center; padding:3rem 1rem; color:var(--text-light); }
  .empty-state i { font-size:4rem; margin-bottom:1rem; color:var(--primary-light); }
  
  .neutral-message {
    text-align: center;
    margin-top: 1rem;
    padding: 0.8rem;
    background: #e9ecef;
    color: #6c757d;
    border-radius: var(--radius);
    font-weight: normal;
  }
  
  .simple-table {
    width: 100%;
    border-collapse: collapse;
    margin: 1rem 0;
    font-size: 14px;
  }
  .simple-table th, .simple-table td {
    border: 1px solid #ddd;
    padding: 8px;
    text-align: center;
  }
  .simple-table th {
    background: var(--primary-light);
    font-weight: bold;
  }
  .simple-table td:first-child {
    text-align: left;
  }
  .section-subtitle {
    font-size: 1.1rem;
    color: var(--primary);
    margin: 1rem 0 0.5rem 0;
    padding-bottom: 0.3rem;
    border-bottom: 2px solid var(--primary-light);
  }
  
  @media (max-width:768px) {
    .releve-table { font-size: 11px; }
    .releve-table th, .releve-table td { padding: 6px 4px; }
  }
</style>
</head>
<body>

<header>
  <div class="container">
    <h1><i class="fas fa-graduation-cap"></i> ISET Rosso - Relevé de Notes</h1>
    <p>Document officiel des résultats académiques</p>
  </div>
</header>

<div class="container">
  <div id="studentView" class="card">
    <div id="studentResults"></div>
    <div id="pdfButtonContainer" style="text-align:center; margin-top:1.5rem;"></div>
  </div>
</div>

<footer class="footer" style="text-align:center; padding:2rem; color:#666;">
  <p>© 2024 ISET Rosso - Institut Supérieur d'Enseignement Technologique</p>
</footer>

<script>
  // ==================== CONFIGURATION ====================
  const SEMESTERS_CONFIG = {
    TC: {
      S1: { name: "Semestre 1", modules: {
        M11: { name: "Module 11", credit: 6.0, subjects: [
          { code: "ANG1", name: "Anglais", credit: 3.0, hasTP: false },
          { code: "FRA1", name: "Français", credit: 3.0, hasTP: false }
        ]},
        M12: { name: "Module 12", credit: 8.0, subjects: [
          { code: "INFO", name: "Informatique", credit: 3.0, hasTP: true },
          { code: "MATH", name: "Math et Statistique", credit: 5.0, hasTP: false }
        ]},
        M13: { name: "Module 13", credit: 8.0, subjects: [
          { code: "PHY", name: "Physique", credit: 4.0, hasTP: true },
          { code: "CHIM", name: "Chimie", credit: 4.0, hasTP: true }
        ]},
        M14: { name: "Module 14", credit: 8.0, subjects: [
          { code: "BIO", name: "Biologie", credit: 4.0, hasTP: true },
          { code: "MICRO", name: "Micro et Génétique", credit: 4.0, hasTP: true }
        ]}
      }},
      S2: { name: "Semestre 2", modules: {
        M21: { name: "Module 21", credit: 6.0, subjects: [
          { code: "ANG2", name: "Anglais 2", credit: 3.0, hasTP: false },
          { code: "FRA2", name: "Français 2", credit: 3.0, hasTP: false }
        ]},
        M22: { name: "Module 22", credit: 6.0, subjects: [
          { code: "TIC", name: "TIC", credit: 3.0, hasTP: true },
          { code: "PPV", name: "PPV", credit: 3.0, hasTP: true }
        ]},
        M23: { name: "Module 23", credit: 6.0, subjects: [
          { code: "PSA", name: "PSA", credit: 3.0, hasTP: true },
          { code: "STA", name: "STA", credit: 3.0, hasTP: true }
        ]},
        M24: { name: "Module 24", credit: 6.0, subjects: [
          { code: "GEM", name: "GEM", credit: 3.0, hasTP: true },
          { code: "GAB", name: "GAB", credit: 3.0, hasTP: true }
        ]}
      }}
    },
    PPV: {
      S3: { name: "Semestre 3", modules: {
        M31: { name: "Module 31", credit: 6.0, subjects: [
          { code: "FRA3", name: "Français 3", credit: 3.0, hasTP: false },
          { code: "ECO", name: "Économie", credit: 3.0, hasTP: false }
        ]},
        M32: { name: "Module 32", credit: 8.0, subjects: [
          { code: "AGRON", name: "I.Agronomie", credit: 4.0, hasTP: true },
          { code: "HORTI", name: "I.Horticulture", credit: 4.0, hasTP: true }
        ]},
        M33: { name: "Module 33", credit: 8.0, subjects: [
          { code: "PEST", name: "Pesticides agricoles", credit: 4.0, hasTP: true },
          { code: "ENTO", name: "Entomologie et Nemato", credit: 4.0, hasTP: true }
        ]},
        M34: { name: "Module 34", credit: 8.0, subjects: [
          { code: "SOL", name: "Science des sols", credit: 4.0, hasTP: true },
          { code: "PLANT", name: "Science des plantes", credit: 4.0, hasTP: true }
        ]}
      }},
      S4: { name: "Semestre 4", modules: {
        M41: { name: "Module 41", credit: 3.0, subjects: [
          { code: "VULG", name: "Vulgarisation", credit: 3.0, hasTP: false }
        ]},
        M42: { name: "Module 42", credit: 7.0, subjects: [
          { code: "PROPAG", name: "Technique de propagation", credit: 4.0, hasTP: true },
          { code: "IRRIG", name: "Technique d'irrigation et BEC", credit: 3.0, hasTP: true }
        ]},
        M43: { name: "Module 43", credit: 7.0, subjects: [
          { code: "ECOPHY", name: "Ecophysiologie et Biochimie", credit: 4.0, hasTP: true },
          { code: "FERTIL", name: "Fertilité du sol", credit: 3.0, hasTP: true }
        ]},
        M44: { name: "Module 44", credit: 6.0, subjects: [
          { code: "DIAG", name: "Méthodes de diagnostic", credit: 3.0, hasTP: true },
          { code: "MALHER", name: "Malherbologie", credit: 3.0, hasTP: true }
        ]}
      }}
    }
  };

  // المواد التي ليس لها TP
  const SUBJECTS_WITHOUT_TP = [
    "Anglais", "Anglais 2", "Français", "Français 2", "Français 3",
    "Math et Statistique", "Économie", "Vulgarisation", "Technique d'irrigation et BEC"
  ];

  function hasTP(subjectName) { return !SUBJECTS_WITHOUT_TP.includes(subjectName); }

  function displaySubjectName(name) {
    return name;
  }

  // تخزين البيانات
  let allStudents = JSON.parse(localStorage.getItem('iset_local_students')) || {};
  let currentStudentData = null;
  let currentStudentId = null;
  let currentDept = null;
  let currentSemester = null;

  // دالة عرض النتائج
  function displayStudentResults(student, studentId, dept, semester) {
    const results = student.results;
    const semesterConfig = SEMESTERS_CONFIG[dept][semester];
    
    // ✅ إذا كانت النتائج غير محسوبة أو لا توجد
    if (!results || !student.calculated) {
      // عرض الجداول المنفصلة (TP, CC, Examen)
      let html = `
        <div class="student-header">
          <i class="fas fa-user-graduate"></i>
          <h3>${student.name || 'Étudiant'}</h3>
          <p>N° ${studentId} | ${dept} | ${semesterConfig.name}</p>
        </div>
        <div class="neutral-message">
          <i class="fas fa-info-circle"></i> Les résultats n'ont pas encore été calculés par le coordinateur.
        </div>
      `;
      
      // جدول TP
      let hasTPData = false;
      let tpHtml = '<h4 class="section-subtitle">Résultats TP</h4><table class="simple-table"><thead><tr><th>Matière</th><th>Note TP</th></tr></thead><tbody>';
      for (let moduleCode in semesterConfig.modules) {
        for (let subject of semesterConfig.modules[moduleCode].subjects) {
          if (subject.hasTP) {
            const grade = student.grades?.[subject.code]?.tp;
            if (grade !== undefined) hasTPData = true;
            tpHtml += `<tr><td>${subject.name}</td><td>${grade !== undefined ? grade.toFixed(2) : '-'}</td></tr>`;
          }
        }
      }
      tpHtml += '</tbody>赶';
      if (hasTPData) html += tpHtml;
      
      // جدول CC
      let ccHtml = '<h4 class="section-subtitle">Résultats Contrôle continu</h4><table class="simple-table"><thead><tr><th>Matière</th><th>Note CC</th></tr></thead><tbody>';
      for (let moduleCode in semesterConfig.modules) {
        for (let subject of semesterConfig.modules[moduleCode].subjects) {
          const grade = student.grades?.[subject.code]?.cc;
          ccHtml += `<tr><td>${subject.name}</td><td>${grade !== undefined ? grade.toFixed(2) : '-'}</td></tr>`;
        }
      }
      ccHtml += '</tbody>赶';
      html += ccHtml;
      
      // جدول Examen
      let examHtml = '<h4 class="section-subtitle">Résultats Examen</h4><table class="simple-table"><thead><tr><th>Matière</th><th>Note Examen</th></tr></thead><tbody>';
      for (let moduleCode in semesterConfig.modules) {
        for (let subject of semesterConfig.modules[moduleCode].subjects) {
          const grade = student.grades?.[subject.code]?.examen;
          examHtml += `<tr><td>${subject.name}</td><td>${grade !== undefined ? grade.toFixed(2) : '-'}</td></tr>`;
        }
      }
      examHtml += '</tbody>赶';
      html += examHtml;
      
      document.getElementById('studentResults').innerHTML = html;
      document.getElementById('pdfButtonContainer').innerHTML = '';
      return;
    }
    
    // ✅ إذا كانت النتائج محسوبة - عرض الجدول النهائي
    let html = `
      <div class="student-header">
        <i class="fas fa-user-graduate"></i>
        <h3>${student.name || 'Étudiant'}</h3>
        <p>N° ${studentId} | ${dept} | ${semesterConfig.name}</p>
      </div>
    `;
    
    html += '<div style="overflow-x:auto;"><table class="releve-table">';
    html += '<thead><tr>';
    html += '<th>Numéro</th><th>Nom et Prénom</th><th>TP</th><th>CC</th><th>Examen</th><th>NFe</th><th>Crédit</th><th>Observations</th>';
    html += '</thead><tbody>';
    
    // Ligne étudiant
    html += `<tr class="student-info-row">
      <td>${studentId}</td>
      <td style="text-align:left; padding-left:15px;">${student.name}</td>
      <td style="text-align:center;">-</td><td style="text-align:center;">-</td><td style="text-align:center;">-</td>
      <td style="font-weight:bold;">Moy Sem: ${results.moyenneGenerale.toFixed(2)}</td>
      <td style="text-align:center;">-</td>
      <td class="${results.semestreStatus === 'Validé' ? 'status-V' : 'status-NV'}">${results.semestreStatus}</td>
    </tr>`;
    
    // Modules et matières
    for (let moduleCode in results.modules) {
      const module = results.modules[moduleCode];
      
      html += `<tr class="module-row">
        <td>${moduleCode}</td>
        <td style="text-align:left; padding-left:15px;">${module.name}</td>
        <td style="text-align:center;">-</td><td style="text-align:center;">-</td><td style="text-align:center;">-</td>
        <td style="font-weight:bold;">${module.moyenne.toFixed(2)}</td>
        <td style="text-align:center;">${module.credit}</td>
        <td class="${module.status === 'V' ? 'status-V' : 'status-NV'}">${module.status}</td>
      </tr>`;
      
      for (let subject of module.subjects) {
        const grades = student.grades?.[subject.code] || {};
        const tpDisplay = subject.hasTP ? (grades.tp !== undefined ? grades.tp.toFixed(2) : '-') : '-';
        const creditEarned = subject.status === 'C' ? subject.credit : 0;
        
        html += `<tr class="subject-row">
          <td style="text-align:center;">-</td>
          <td style="text-align:left; padding-left:40px;">${subject.name}</td>
          <td style="text-align:center;">${tpDisplay}</td>
          <td style="text-align:center;">${grades.cc !== undefined ? grades.cc.toFixed(2) : '-'}</td>
          <td style="text-align:center;">${grades.examen !== undefined ? grades.examen.toFixed(2) : '-'}</td>
          <td style="font-weight:bold;">${subject.moyenne.toFixed(2)}</td>
          <td style="text-align:center;">${creditEarned.toFixed(1)}</td>
          <td class="${subject.status === 'C' ? 'status-C' : 'status-NC'}">${subject.status}</td>
        </tr>`;
      }
    }
    
    html += '</tbody></table></div>';
    
    document.getElementById('studentResults').innerHTML = html;
    
    // زر PDF
    document.getElementById('pdfButtonContainer').innerHTML = `
      <button class="admin-btn success" onclick="generatePDF()">
        <i class="fas fa-file-pdf"></i> 📂 Télécharger mon relevé PDF
      </button>
    `;
  }
  
  function generatePDF() {
    const student = currentStudentData;
    const results = student?.results;
    if (!results || !student?.calculated) {
      alert("Les résultats ne sont pas encore disponibles.");
      return;
    }
    
    const semesterName = SEMESTERS_CONFIG[currentDept][currentSemester].name;
    
    let content = `
      <div style="padding: 15mm; font-family: 'Times New Roman', Times, serif; font-size:12px;">
        <div style="text-align:center; margin-bottom:20px;">
          <h2>République Islamique de Mauritanie</h2>
          <h3>Ministère de l'Enseignement Supérieur et de la Recherche Scientifique</h3>
          <h3>Institut Supérieur d'Enseignement Technologique de Rosso</h3>
          <hr style="margin:15px 0">
          <h1 style="color:#0077b6;">RELEVÉ DE NOTES</h1>
          <h3>${semesterName}</h3>
          <h3>Année académique 2024-2025</h3>
        </div>
        
        <table style="width:100%; border-collapse:collapse; margin-bottom:20px;">
          <tr><td style="padding:5px;"><strong>Étudiant(e) :</strong> ${student.name}</td>
              <td style="padding:5px;"><strong>N° d'étudiant :</strong> ${currentStudentId}</td>
              <td style="padding:5px;"><strong>Département :</strong> ${currentDept}</td>
          </tr>
        </table>
        
        <table style="width:100%; border-collapse:collapse; border:1px solid #000;">
          <thead>
            <tr style="background:#caf0f8;">
              <th style="border:1px solid #000; padding:8px;">Numéro</th>
              <th style="border:1px solid #000; padding:8px;">Nom et Prénom</th>
              <th style="border:1px solid #000; padding:8px;">TP</th>
              <th style="border:1px solid #000; padding:8px;">CC</th>
              <th style="border:1px solid #000; padding:8px;">Examen</th>
              <th style="border:1px solid #000; padding:8px;">NFe</th>
              <th style="border:1px solid #000; padding:8px;">Crédit</th>
              <th style="border:1px solid #000; padding:8px;">Observations</th>
            </tr>
          </thead>
          <tbody>
    `;
    
    content += `<tr style="background:#f0f8ff;">
      <td style="border:1px solid #000; padding:8px;">${currentStudentId}</td>
      <td style="border:1px solid #000; padding:8px; text-align:left;">${student.name}</td>
      <td style="border:1px solid #000; padding:8px;">-</td><td style="border:1px solid #000; padding:8px;">-</td><td style="border:1px solid #000; padding:8px;">-</td>
      <td style="border:1px solid #000; padding:8px; font-weight:bold;">Moy Sem: ${results.moyenneGenerale.toFixed(2)}</td>
      <td style="border:1px solid #000; padding:8px;">-</td>
      <td style="border:1px solid #000; padding:8px; font-weight:bold;">${results.semestreStatus}</td>
    </tr>`;
    
    for (let moduleCode in results.modules) {
      const module = results.modules[moduleCode];
      content += `<tr style="background:#e8f4fc;">
        <td style="border:1px solid #000; padding:8px;">${moduleCode}</td>
        <td style="border:1px solid #000; padding:8px; text-align:left;">${module.name}</td>
        <td style="border:1px solid #000; padding:8px;">-</td><td style="border:1px solid #000; padding:8px;">-</td><td style="border:1px solid #000; padding:8px;">-</td>
        <td style="border:1px solid #000; padding:8px; font-weight:bold;">${module.moyenne.toFixed(2)}</td>
        <td style="border:1px solid #000; padding:8px;">${module.credit}</td>
        <td style="border:1px solid #000; padding:8px;">${module.status}</td>
      </tr>`;
      
      for (let subject of module.subjects) {
        const grades = student.grades?.[subject.code] || {};
        const tpDisplay = subject.hasTP ? (grades.tp !== undefined ? grades.tp.toFixed(2) : '-') : '-';
        const creditEarned = subject.status === 'C' ? subject.credit : 0;
        
        content += `<tr>
          <td style="border:1px solid #000; padding:8px;">-</td>
          <td style="border:1px solid #000; padding:8px; text-align:left; padding-left:20px;">${subject.name}</td>
          <td style="border:1px solid #000; padding:8px;">${tpDisplay}</td>
          <td style="border:1px solid #000; padding:8px;">${grades.cc !== undefined ? grades.cc.toFixed(2) : '-'}</td>
          <td style="border:1px solid #000; padding:8px;">${grades.examen !== undefined ? grades.examen.toFixed(2) : '-'}</td>
          <td style="border:1px solid #000; padding:8px; font-weight:bold;">${subject.moyenne.toFixed(2)}</td>
          <td style="border:1px solid #000; padding:8px;">${creditEarned.toFixed(1)}</td>
          <td style="border:1px solid #000; padding:8px;">${subject.status}</td>
        </tr>`;
      }
    }
    
    content += `
          </tbody>
        </table>
        
        <div style="margin-top:30px;">
          <p style="text-align:right;">Fait à Rosso, le ${new Date().toLocaleDateString('fr-FR')}</p>
          <div style="text-align:right; margin-top:30px;">
            <p>Le Chef du Service Scolarité</p>
            <div style="border-top:1px solid #000; width:200px; margin-top:5px; margin-left:auto;"></div>
          </div>
        </div>
      </div>
    `;
    
    const element = document.createElement('div');
    element.innerHTML = content;
    document.body.appendChild(element);
    
    html2pdf().set({ 
      margin: 0, 
      filename: `Releve_${currentStudentId}_${currentSemester}.pdf`, 
      image: { type: 'jpeg', quality: 0.98 }, 
      html2canvas: { scale: 2 }, 
      jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } 
    }).from(element).save().then(() => { 
      document.body.removeChild(element); 
    });
  }
  
  // ==================== تحميل البيانات من الرابط ====================
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.has('dept') && urlParams.has('sem') && urlParams.has('id')) {
    const dept = urlParams.get('dept');
    const sem = urlParams.get('sem');
    const id = urlParams.get('id');
    const name = urlParams.get('name');
    
    const key = `${dept}_${sem}_${id}`;
    let student = allStudents[key];
    
    // إذا لم يكن الطالب موجوداً، ننشئه
    if (!student) {
      student = { name: name || 'Étudiant', grades: {}, calculated: false };
      allStudents[key] = student;
      localStorage.setItem('iset_local_students', JSON.stringify(allStudents));
    }
    
    currentStudentData = student;
    currentStudentId = id;
    currentDept = dept;
    currentSemester = sem;
    
    displayStudentResults(student, id, dept, sem);
  } else {
    document.getElementById('studentResults').innerHTML = `
      <div class="empty-state">
        <i class="fas fa-exclamation-triangle"></i>
        <h3>Lien invalide</h3>
        <p>Veuillez utiliser le lien fourni par l'administration.</p>
      </div>
    `;
  }
</script>
</body>
</html>
